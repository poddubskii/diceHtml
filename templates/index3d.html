<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бросок из стакана 3D</title>
    <style>
        :root {
            --dice-size: clamp(45px, 12vw, 70px);
            --cup-width: clamp(80px, 20vw, 120px);
            --cup-height: clamp(120px, 28vw, 160px);
            --table-color: #1a472a;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #2c3e50 0%, #000 100%);
            perspective: 2000px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: pan-y pinch-zoom;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Стол */
        .table {
            position: absolute;
            width: 300%;
            height: 300%;
            background:
                radial-gradient(circle at 30% 30%, var(--table-color) 0%, #0d2b1a 100%),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255,255,255,0.02) 2px,
                    rgba(255,255,255,0.02) 4px
                );
            transform: rotateX(75deg) translateZ(-300px) translateX(-25%) translateY(-25%);
            z-index: -1;
            box-shadow:
                inset 0 0 150px rgba(0, 0, 0, 0.8),
                0 0 100px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        /* Стакан */
        .cup-container {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .cup {
            width: var(--cup-width);
            height: var(--cup-height);
            background: linear-gradient(to bottom,
                rgba(60, 60, 60, 0.95) 0%,
                rgba(40, 40, 40, 0.95) 100%);
            border: 4px solid #666;
            border-top: none;
            border-radius: 0 0 25px 25px;
            position: relative;
            transform: rotateX(-15deg);
            box-shadow:
                inset 0 -10px 20px rgba(0,0,0,0.5),
                0 15px 30px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .cup::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -4px;
            width: calc(100% + 8px);
            height: 40px;
            background: linear-gradient(to bottom, #555, #444);
            border-radius: 50%;
            border: 2px solid #777;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .cup::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255,255,255,0.1) 50%,
                transparent 100%);
            pointer-events: none;
        }

        /* Контейнер для кубиков */
        .dice-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            padding: 18vh 8vw 18vh 8vw;
            pointer-events: auto;
            z-index: 5;
        }

        .dice-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
            pointer-events: auto;
            cursor: pointer;
            border-radius: 10px;
        }

        .dice-wrapper.selected {
            filter: drop-shadow(0 0 0 3px #f1c40f) drop-shadow(0 5px 15px rgba(241, 196, 15, 0.5));
            transform: scale(1.05);
        }

        .dice-wrapper.selected::after {
            content: '✓';
            position: absolute;
            top: -10px;
            right: -10px;
            width: 30px;
            height: 30px;
            background: #f1c40f;
            color: #2c3e50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 50;
        }

        .dice {
            width: var(--dice-size);
            height: var(--dice-size);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .dice img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .die-img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        /* Анимация тряски */
        @keyframes shake {
            0%, 100% { transform: translateX(-50%) translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-50%) translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(-50%) translateX(5px); }
        }

        .shaking {
            animation: shake 0.5s ease-in-out infinite;
        }

        /* Кнопка броска */
        button {
            position: fixed;
            bottom: clamp(15px, 4vh, 25px);
            left: 50%;
            transform: translateX(-50%);
            padding: clamp(12px, 3.5vw, 16px) clamp(25px, 8vw, 40px);
            background: linear-gradient(to bottom, #f1c40f, #e67e22);
            color: #2c3e50;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: clamp(16px, 4.5vw, 20px);
            cursor: pointer;
            box-shadow:
                0 6px 0 #bc9c0d,
                0 10px 25px rgba(0,0,0,0.4);
            z-index: 30;
            transition: all 0.1s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            -webkit-appearance: none;
            border: 2px solid rgba(255,255,255,0.2);
        }

        button:active {
            transform: translateX(-50%) translateY(4px);
            box-shadow:
                0 2px 0 #bc9c0d,
                0 5px 15px rgba(0,0,0,0.3);
        }

        button:disabled {
            opacity: 0.7;
            transform: translateX(-50%) translateY(4px);
            box-shadow: 0 2px 0 #bc9c0d;
        }

        /* Информационная панель */
        .info-panel {
            position: fixed;
            top: clamp(10px, 3vh, 15px);
            right: clamp(10px, 3vw, 15px);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: clamp(8px, 2.5vw, 12px) clamp(12px, 3.5vw, 18px);
            border-radius: 12px;
            font-size: clamp(14px, 4vw, 16px);
            z-index: 40;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            min-width: 100px;
            text-align: center;
        }

        .total {
            font-size: clamp(22px, 6vw, 28px);
            font-weight: bold;
            color: #f1c40f;
            margin-top: 3px;
            text-shadow: 0 2px 5px rgba(241, 196, 15, 0.3);
        }

        /* Контролы для изменения количества */
        .dice-controls {
            position: fixed;
            top: clamp(10px, 3vh, 15px);
            left: clamp(10px, 3vw, 15px);
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.85);
            padding: 6px 10px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 40;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .control-btn {
            width: clamp(40px, 11vw, 48px);
            height: clamp(40px, 11vw, 48px);
            border-radius: 50%;
            background: linear-gradient(to bottom, #f1c40f, #e67e22);
            border: none;
            color: #2c3e50;
            font-size: clamp(24px, 7vw, 28px);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-appearance: none;
            box-shadow: 0 4px 0 #bc9c0d;
            transition: all 0.1s ease;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .control-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #bc9c0d;
        }

        .control-btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 0 0 #bc9c0d;
            pointer-events: none;
        }

        .count-display {
            color: white;
            font-size: clamp(18px, 5.5vw, 22px);
            font-weight: bold;
            min-width: 45px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Адаптация для ландшафтной ориентации */
        @media (orientation: landscape) {
            .dice-field {
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(2, 1fr);
                padding: 10vh 12vw 10vh 12vw;
                gap: 20px;
            }

            .cup-container {
                top: 5%;
            }
        }

        /* Для маленьких экранов */
        @media (max-height: 600px) {
            .dice-field {
                padding: 12vh 5vw 12vh 5vw;
            }
            .cup-container {
                top: 3%;
            }
        }

        .hint {
            position: fixed;
            bottom: clamp(70px, 12vh, 90px);
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            z-index: 25;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="table"></div>

    <div class="cup-container" id="cup">
        <div class="cup"></div>
    </div>

    <div class="dice-field" id="field"></div>

    <div class="dice-controls">
        <button class="control-btn" id="decreaseBtn" onclick="changeDiceCount(-1)">−</button>
        <span class="count-display" id="diceCountDisplay">5</span>
        <button class="control-btn" id="increaseBtn" onclick="changeDiceCount(1)">+</button>
    </div>

    <div class="info-panel" id="infoPanel">
        <div>Сумма</div>
        <div class="total" id="totalSum">0</div>
    </div>

    <div class="hint">нажми на кубик чтобы сохранить</div>

    <button onclick="rollSelectedDice()" id="throwBtn">🎲 БРОСИТЬ 🎲</button>

    <script>
        const field = document.getElementById('field');
        const cup = document.getElementById('cup');
        const totalSumElem = document.getElementById('totalSum');
        const diceCountDisplay = document.getElementById('diceCountDisplay');
        const throwBtn = document.getElementById('throwBtn');
        const decreaseBtn = document.getElementById('decreaseBtn');
        const increaseBtn = document.getElementById('increaseBtn');

        let diceCount = 5;
        let isAnimating = false;
        let currentValues = new Array(diceCount).fill(1);
        let dies = [];

        // Папка с изображениями (по умолчанию)
        const folder = "default";

        // Позиции в сетке для кубиков
        const gridPositions = [
            { gridArea: '1 / 1' },
            { gridArea: '1 / 2' },
            { gridArea: '2 / 1' },
            { gridArea: '2 / 2' },
            { gridArea: '3 / 1' },
            { gridArea: '3 / 2' },
        ];

        const landscapePositions = [
            { gridArea: '1 / 1' },
            { gridArea: '1 / 2' },
            { gridArea: '1 / 3' },
            { gridArea: '2 / 1' },
            { gridArea: '2 / 2' },
            { gridArea: '2 / 3' },
        ];

        function getGridPosition(index, isLandscape) {
            const positions = isLandscape ? landscapePositions : gridPositions;
            return positions[index % positions.length];
        }

        // Создаем кубики с изображениями
        function createDices(count) {
            field.innerHTML = '';
            currentValues = new Array(count).fill(1);
            dies = [];

            const isLandscape = window.matchMedia("(orientation: landscape)").matches;

            for(let i = 0; i < count; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'dice-wrapper';
                wrap.id = `dice-${i}`;
                wrap.setAttribute('data-index', i);

                const pos = getGridPosition(i, isLandscape);
                wrap.style.gridArea = pos.gridArea;

                const dice = document.createElement('div');
                dice.className = 'dice';

                // Создаем изображение для кубика
                const img = document.createElement('img');
                img.src = `static/img/dice/${folder}/die1.png`;
                img.classList.add('die-img');
                img.alt = 'dice';

                dice.appendChild(img);
                wrap.appendChild(dice);
                field.appendChild(wrap);

                // Добавляем обработчик клика для выбора
                wrap.addEventListener('click', () => {
                    if (!isAnimating) {
                        wrap.classList.toggle('selected');
                    }
                });

                dies.push(wrap);
            }

            diceCountDisplay.textContent = count;
            updateControls();
            updateSum();
        }

        // Обновление состояния кнопок
        function updateControls() {
            decreaseBtn.disabled = diceCount <= 1 || isAnimating;
            increaseBtn.disabled = diceCount >= 6 || isAnimating;
        }

        // Изменение количества кубиков
        window.changeDiceCount = (delta) => {
            const newCount = diceCount + delta;
            if (newCount >= 1 && newCount <= 6 && !isAnimating) {
                diceCount = newCount;
                currentValues = new Array(diceCount).fill(1);
                createDices(diceCount);
            }
        };

        // Обновление суммы
        function updateSum() {
            const sum = currentValues.reduce((a, b) => a + b, 0);
            totalSumElem.textContent = sum;
        }

        // Функция броска выбранных кубиков
        async function rollSelectedDice() {
            if (isAnimating) return;

            // Подсчитываем количество выбранных кубиков
            const selectedDies = dies.filter(die => die.classList.contains('selected')).length;
            const diceToRoll = diceCount - selectedDies;

            if (diceToRoll === 0) {
                alert('Все кубики сохранены! Снимите выделение с некоторых кубиков чтобы бросить их.');
                return;
            }

            isAnimating = true;
            throwBtn.disabled = true;
            updateControls();

            // Отключаем возможность выбора во время анимации
            dies.forEach(die => {
                die.style.pointerEvents = 'none';
            });

            try {
                // Запрос к API
                const response = await fetch('/api/roll-dice', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ dice: diceToRoll })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();
                const results = data.results;

                // Скрываем кубики в стакане (только те, которые будем бросать)
                let resultIndex = 0;
                dies.forEach((wrap, i) => {
                    if (!wrap.classList.contains('selected')) {
                        wrap.style.transition = 'none';
                        wrap.style.opacity = '0';
                        wrap.style.transform = 'translate(0, -250px) scale(0.3)';
                    }
                });

                // Небольшая задержка для применения стилей
                await new Promise(resolve => setTimeout(resolve, 50));

                // Тряска стакана
                cup.classList.add('shaking');

                await new Promise(resolve => setTimeout(resolve, 500));

                // Наклон стакана
                cup.classList.remove('shaking');
                cup.style.transform = 'translateX(-50%) translateY(-20px) rotateX(-20deg) rotateZ(-110deg)';

                await new Promise(resolve => setTimeout(resolve, 200));

                // Вылет кубиков (только тех, что бросаем)
                dies.forEach((wrap, i) => {
                    if (!wrap.classList.contains('selected')) {
                        setTimeout(() => {
                            wrap.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 64, 1)';
                            wrap.style.opacity = '1';
                            wrap.style.transform = 'translate(0, 0) scale(1)';

                            // Обновляем изображение с результатом
                            const val = results[resultIndex];
                            currentValues[i] = val;
                            const img = wrap.querySelector('img');
                            img.src = `static/img/dice/${folder}/die${val}.png`;

                            resultIndex++;
                        }, i * 120);
                    }
                });

                // Возврат стакана
                setTimeout(() => {
                    cup.style.transform = 'translateX(-50%) translateY(0) rotateX(0deg) rotateZ(0deg)';
                }, 800);

                // Обновляем сумму
                updateSum();

            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка при броске кубиков');
            }

            // Активация кнопок и возврат возможности выбора
            setTimeout(() => {
                throwBtn.disabled = false;
                isAnimating = false;
                updateControls();

                dies.forEach(die => {
                    die.style.pointerEvents = 'auto';
                });
            }, 2000);
        }

        // Обработка изменения ориентации
        window.addEventListener('resize', () => {
            if (!isAnimating) {
                const isLandscape = window.matchMedia("(orientation: landscape)").matches;
                const wraps = document.querySelectorAll('.dice-wrapper');

                wraps.forEach((wrap, i) => {
                    const pos = getGridPosition(i, isLandscape);
                    wrap.style.gridArea = pos.gridArea;
                });
            }
        });

        // Инициализация
        createDices(diceCount);

        // Защита от скролла
        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('.dice-wrapper')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
