<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Dice Mobile</title>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <style>
        body { 
            margin: 0; overflow: hidden; background: #050608; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            user-select: none; touch-action: none;
        }
        
        #ui-top {
            position: fixed; top: env(safe-area-inset-top, 20px); left: 0; width: 100%; 
            text-align: center; color: #fff; z-index: 200; pointer-events: none;
        }
        .stats { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #4facfe; }
        .total-score { font-size: 56px; font-weight: 900; line-height: 1; margin: 5px 0; }
        
        #held-tray {
            display: flex; justify-content: center; gap: 6px; min-height: 30px;
        }
        .die-icon {
            background: #4facfe; color: #000; width: 24px; height: 24px; 
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px;
        }

        #ui-bottom {
            position: fixed; bottom: env(safe-area-inset-bottom, 30px); left: 50%; 
            transform: translateX(-50%); z-index: 150; width: 90%; max-width: 450px;
            display: flex; flex-direction: column; gap: 15px;
        }
        
        .meter-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; display: none; }
        #power-bar { width: 0%; height: 100%; background: #4facfe; border-radius: 3px; }

        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; height: 70px; font-size: 18px; font-weight: 800;
            cursor: pointer; border-radius: 20px; border: none;
            background: #fff; color: #000; text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { background: #e0e0e0; transform: scale(0.98); }
        button:disabled { opacity: 0.2; }
        #reset-btn { flex: 0.35; background: rgba(255,255,255,0.1); color: #fff; }

        #hint { color: rgba(255,255,255,0.4); font-size: 12px; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="stats">Попыток: <span id="rolls-count">3</span> / 3</div>
        <div class="total-score" id="res-text">0</div>
        <div id="held-tray"></div>
    </div>

    <div id="ui-bottom">
        <div id="hint">Нажми на кубик, чтобы оставить его</div>
        <div class="meter-container" id="meter"><div id="power-bar"></div></div>
        <div class="btn-group">
            <button id="roll-btn">Бросок</button>
            <button id="reset-btn">Сброс</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        let rollsLeft = 3;
        const DICE_COUNT = 5;
        const diceObjects = [];
        let isRolling = false, isCharging = false, charge = 0;

        // СЦЕНА
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 25);
        camera.lookAt(0, -5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -35, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5, 30, 10);
        sun.castShadow = true;
        scene.add(sun);

        // АРЕНА
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 50), new THREE.MeshStandardMaterial({ color: 0x08090a }));
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const floorBody = new CANNON.Body({ mass: 0 });
        floorBody.addShape(new CANNON.Plane());
        floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(floorBody);

        const addWall = (x, z, w, d) => {
            const b = new CANNON.Body({ mass: 0 });
            b.addShape(new CANNON.Box(new CANNON.Vec3(w/2 + 5, 5, d/2 + 5))); // Толстые стенки
            b.position.set(x + (x !== 0 ? (x > 0 ? 5 : -5) : 0), 2, z + (z !== 0 ? (z > 0 ? 5 : -5) : 0));
            world.addBody(b);
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, 4, d), new THREE.MeshStandardMaterial({ color: 0x121418 }));
            m.position.set(x, 1, z);
            scene.add(m);
        };
        addWall(0, -20, 35, 1); addWall(0, 20, 35, 1);
        addWall(-17.5, 0, 1, 40); addWall(17.5, 0, 1, 40);

        // КУБИКИ
        function createDiceTexture(n) {
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff'; ctx.fillRect(0,0,128,128);
            ctx.fillStyle = '#000';
            const pts = { 1:[[64,64]], 2:[[32,32],[96,96]], 3:[[32,32],[64,64],[96,96]], 4:[[32,32],[96,32],[32,96],[96,96]], 5:[[32,32],[96,32],[64,64],[32,96],[96,96]], 6:[[32,32],[96,32],[32,64],[96,64],[32,96],[96,96]] };
            pts[n].forEach(p => { ctx.beginPath(); ctx.arc(p[0], p[1], 15, 0, 7); ctx.fill(); });
            return new THREE.CanvasTexture(canvas);
        }
        const mats = [3,4,2,5,1,6].map(n => new THREE.MeshStandardMaterial({ map: createDiceTexture(n) }));

        for (let i = 0; i < DICE_COUNT; i++) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), mats);
            mesh.castShadow = true;
            scene.add(mesh);
            const body = new CANNON.Body({ mass: 1, shape: new CANNON.Box(new CANNON.Vec3(1,1,1)), sleepTimeLimit: 0.1 });
            body.position.set(i*3-6, 1.1, 0);
            world.addBody(body);
            diceObjects.push({ mesh, body, isHeld: false, heldValue: 0 });
        }

        // ЛОГИКА
        const rollBtn = document.getElementById('roll-btn');
        const pBar = document.getElementById('power-bar');

        const launch = () => {
            if (isRolling || rollsLeft <= 0) return;
            isRolling = true; rollsLeft--;
            document.getElementById('rolls-count').innerText = rollsLeft;
            rollBtn.disabled = true;
            
            const power = 20 + (charge/100)*25;
            diceObjects.forEach((d, i) => {
                if (!d.isHeld) {
                    d.body.type = CANNON.Body.DYNAMIC;
                    d.body.wakeUp();
                    d.body.position.set(14, 10 + i, (Math.random()-0.5)*12);
                    d.body.velocity.set(-power, -10, (Math.random()-0.5)*15);
                    d.body.angularVelocity.set(Math.random()*20, Math.random()*20, Math.random()*20);
                }
            });
            setTimeout(checkStop, 1000);
        };

        function checkStop() {
            const iter = setInterval(() => {
                const moving = diceObjects.some(d => !d.isHeld && d.body.sleepState !== CANNON.Body.SLEEPING && d.body.velocity.length() > 0.2);
                if (!moving) { clearInterval(iter); isRolling = false; if(rollsLeft > 0) rollBtn.disabled = false; updateUI(); }
            }, 200);
        }

        function getVal(body) {
            const dirs = [{v:new THREE.Vector3(1,0,0),val:3},{v:new THREE.Vector3(-1,0,0),val:4},{v:new THREE.Vector3(0,1,0),val:2},{v:new THREE.Vector3(0,-1,0),val:5},{v:new THREE.Vector3(0,0,1),val:1},{v:new THREE.Vector3(0,0,-1),val:6}];
            const q = new THREE.Quaternion(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
            let max = -1, v = 1;
            dirs.forEach(d => { const worldV = d.v.clone().applyQuaternion(q); if(worldV.y > max) { max = worldV.y; v = d.val; } });
            return v;
        }

        function updateUI() {
            let total = 0;
            const tray = document.getElementById('held-tray');
            tray.innerHTML = '';
            diceObjects.forEach(d => {
                const v = d.isHeld ? d.heldValue : getVal(d.body);
                total += v;
                if(d.isHeld) {
                    const el = document.createElement('div'); el.className = 'die-icon'; el.innerText = d.heldValue;
                    tray.appendChild(el);
                }
            });
            document.getElementById('res-text').innerText = total;
        }

        // ТАЧ И КЛИК
        const ray = new THREE.Raycaster();
        const m = new THREE.Vector2();

        function handleInput(x, y) {
            if(isRolling) return;
            m.x = (x / window.innerWidth) * 2 - 1; m.y = -(y / window.innerHeight) * 2 + 1;
            ray.setFromCamera(m, camera);
            const hits = ray.intersectObjects(diceObjects.map(d => d.mesh));
            if(hits.length > 0) {
                const d = diceObjects.find(o => o.mesh === hits[0].object);
                d.isHeld = !d.isHeld;
                if(d.isHeld) {
                    d.heldValue = getVal(d.body);
                    d.mesh.material.forEach(mt => { mt.emissive.setHex(0x4facfe); mt.emissiveIntensity = 0.4; });
                    d.body.type = CANNON.Body.STATIC;
                    // Оставляем ТЕКУЩИЙ поворот, просто меняем позицию
                    d.body.position.set(-13 + diceObjects.indexOf(d)*6.5, 1.1, -15);
                } else {
                    d.mesh.material.forEach(mt => mt.emissive.setHex(0));
                    d.body.type = CANNON.Body.DYNAMIC;
                    d.body.position.set((Math.random()-0.5)*10, 5, (Math.random()-0.5)*10);
                    d.body.wakeUp();
                }
                updateUI();
            }
        }

        // События управления
        window.addEventListener('touchstart', (e) => handleInput(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));

        rollBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isCharging = true; charge = 0; document.getElementById('meter').style.display='block'; });
        window.addEventListener('touchend', () => { if(isCharging) { isCharging = false; document.getElementById('meter').style.display='none'; launch(); } });
        
        rollBtn.addEventListener('mousedown', () => { isCharging = true; charge = 0; document.getElementById('meter').style.display='block'; });
        window.addEventListener('mouseup', () => { if(isCharging) { isCharging = false; document.getElementById('meter').style.display='none'; launch(); } });

        document.getElementById('reset-btn').addEventListener('click', () => location.reload());

        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);
            diceObjects.forEach(d => { d.mesh.position.copy(d.body.position); d.mesh.quaternion.copy(d.body.quaternion); });
            if(isCharging && charge < 100) { charge += 2.5; pBar.style.width = charge + '%'; }
            renderer.render(scene, camera);
        }
        animate();
        updateUI();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
