<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Dice: Реальная физика качения</title>
    <style>
        :root { --dice-size: 50px; }
        body {
            margin: 0; overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            background: #050505; perspective: 1800px; font-family: 'Segoe UI', sans-serif;
        }

        .scene {
            position: relative; width: 1000px; height: 600px;
            transform-style: preserve-3d; transform: rotateX(60deg);
        }
        .felt {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a472a 0%, #051a0d 100%);
            border: 15px solid #3e2723; border-radius: 30px;
            box-shadow: inset 0 0 100px #000;
        }

        .cup-wrapper {
            position: absolute; top: 5%; left: 50%; margin-left: -50px;
            transform-style: preserve-3d; z-index: 100;
        }
        .cup {
            width: 100px; height: 130px; background: #222;
            border: 2px solid #444; border-radius: 0 0 20px 20px;
        }
        .vibrate { animation: shake 0.1s infinite; }
        .cup-wrap {
            position: absolute; right: -120px; top: 50px;
            width: 100px; height: 120px; background: #5d4037;
            border-radius: 10px 10px 40% 40%; transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
        }

        .dice-wrapper {
            position: absolute; width: var(--dice-size); height: var(--dice-size);
            transform-style: preserve-3d; will-change: transform;
        }
        
        /* Анимация "удара" об борт или другой кубик */
        @keyframes hit-bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .hit { animation: hit-bounce 0.2s ease-out; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        /* ТРЕХСЛОЙНАЯ СТРУКТУРА ДЛЯ ФИЗИКИ:
           1. .dice-wrapper: Отвечает за полет по столу (X, Y)
           2. .dice-z: Отвечает за гравитацию и падение (Z)
           3. .dice: Отвечает за вращение кубика
        */
        .dice-wrapper {
            position: absolute; left: 50%; top: 50px;
            width: var(--dice-size); height: var(--dice-size);
            margin-left: -25px; transform-style: preserve-3d;
            opacity: 0; pointer-events: none;
        }
        .dice-z {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d;
        }
        .dice {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute; width: 50px; height: 50px;
            background: #fff; border: 1px solid #ccc; border-radius: 8px;
            display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 5px; box-sizing: border-box; backface-visibility: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .dot { width: 10px; height: 10px; background: #111; border-radius: 50%; align-self: center; justify-self: center; }

        .f1 { transform: rotateY(0deg) translateZ(25px); }
        .f6 { transform: rotateY(180deg) translateZ(25px); }
        .f2 { transform: rotateX(-90deg) translateZ(25px); }
        .f5 { transform: rotateX(90deg) translateZ(25px); }
        .f3 { transform: rotateY(90deg) translateZ(25px); }
        .f4 { transform: rotateY(-90deg) translateZ(25px); }

        .ui { position: fixed; bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #res-display { color: #f1c40f; font-size: 30px; font-weight: bold; min-height: 40px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .power-bar { width: 300px; height: 15px; background: #222; border-radius: 10px; border: 2px solid #444; overflow: hidden; }
        #power-level { width: 0%; height: 100%; background: linear-gradient(90deg, #27ae60, #f1c40f, #e74c3c); }

        button {
            padding: 20px 60px; background: #c0392b; color: white; border: none;
            border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer;
            box-shadow: 0 6px #962d22; transition: 0.1s; user-select: none;
        }
        button:active { transform: translateY(3px); box-shadow: 0 3px #962d22; }
    </style>
</head>

        <div class="power-bar"><div id="power-level"></div></div>
        <button id="throw-btn">ЗАРЯДИТЬ БРОСОК</button>
    </div>

    <script>
    const cup = document.getElementById('cup');
    const pool = document.getElementById('pool');
    
    function startThrow(p) {
        const isRolling = true;
        
        // 1. Анимация стакана: наклон ВЛЕВО (высыпаем)
        cup.style.transform = "translateX(-100px) rotateZ(-110deg) rotateX(30deg)";

        const diceCount = 5;
        const usedPos = [];
        
        // Очистка поля перед новым броском
        pool.innerHTML = '';

        for(let i=0; i<diceCount; i++) {
            // Создаем кубик (код создания пропущен для краткости, используй свой шаблон)
            const w = createDiceElement(); 
            pool.appendChild(w);

            const dice = w.querySelector('.dice');
            const zWrap = w.querySelector('.dice-z');

            // 2. СТАРТ СПРАВА (в координатах стакана)
            w.style.left = "700px";
            w.style.top = "100px";
            w.style.opacity = "0";

            // 3. РАСЧЕТ ТРАЕКТОРИИ С ОТСКОКОМ
            let tx, ty;
            let attempts = 0;
            do {
                const power = 200 + (p * 10);
                // tx теперь всегда отрицательный (летит влево от стакана)
                tx = -Math.random() * power - 100; 
                ty = (Math.random() - 0.5) * (power * 0.8) + 100;
                attempts++;
            } while (usedPos.some(pos => Math.hypot(tx - pos.x, ty - pos.y) < 70) && attempts < 100);

            usedPos.push({x: tx, y: ty});

            // 4. ЗАПУСК АНИМАЦИИ
            setTimeout(() => {
                const duration = 1.0 + Math.random() * 0.5;
                
                w.style.opacity = "1";
                // Используем плавное замедление для имитации трения
                w.style.transition = `transform ${duration}s cubic-bezier(0.15, 0.85, 0.35, 1), opacity 0.2s`;
                w.style.transform = `translate(${tx}px, ${ty}px) rotateZ(${Math.random() * 360}deg)`;

                // Падение (Z-ось)
                zWrap.style.transition = `transform 0.4s ease-in`;
                zWrap.style.transform = `translateZ(0px)`;

                // Вращение (как я объяснял выше)
                const val = Math.floor(Math.random() * 6) + 1;
                applyRotation(dice, val, tx, ty, duration);

                // Имитация отскока: если кубик летит слишком далеко, 
                // можно добавить класс .hit в середине пути через еще один setTimeout
                setTimeout(() => {
                    w.classList.add('hit');
                }, duration * 500);

            }, i * 60); // Кубики вылетают по очереди
        }

        // Возврат стакана
        setTimeout(() => {
            cup.style.transform = "translate(0) rotate(0)";
        }, 800);
    }

    // Вспомогательная функция для вращения
    function applyRotation(el, val, tx, ty, duration) {
        const rots = {1:{x:0,y:0}, 6:{x:0,y:180}, 2:{x:90,y:0}, 5:{x:-90,y:0}, 3:{x:0,y:-90}, 4:{x:0,y:90}};
        const r = rots[val];
        const spins = 5 + Math.floor(Math.random() * 5);
        
        el.style.transition = `transform ${duration}s cubic-bezier(0.15, 0.85, 0.35, 1)`;
        // Вращаем кубик многократно, прибавляя финальный угол
        el.style.transform = `rotateX(${r.x + spins * 360}deg) rotateY(${r.y + spins * 360}deg)`;
    }
