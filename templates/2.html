<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Dice Arena | Ultra Safe</title>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #050608; font-family: sans-serif; user-select: none; }
        #ui-top {
            position: fixed; top: 25px; left: 0; width: 100%; text-align: center;
            color: #fff; z-index: 200; pointer-events: none;
        }
        .stats { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }
        .result { font-size: 32px; font-weight: 900; color: #ffcc00; }
        
        #ui-bottom {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 150; width: 85%; max-width: 400px; display: flex; flex-direction: column; gap: 12px;
        }
        .meter-container {
            width: 100%; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 4px; overflow: hidden; display: none;
        }
        #power-bar { width: 0%; height: 100%; background: #ff4400; box-shadow: 0 0 10px #ff4400; }

        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 18px; font-size: 18px; font-weight: 800;
            cursor: pointer; border-radius: 12px; border: none;
            background: #fff; color: #000; text-transform: uppercase;
        }
        button:disabled { opacity: 0.2; }
        #reset-btn { flex: 0.4; background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="stats">Броски: <span id="rolls-count">3</span> / 3</div>
        <div id="res-text" class="result">ГОТОВ</div>
    </div>

    <div id="ui-bottom">
        <div class="meter-container" id="meter"><div id="power-bar"></div></div>
        <div class="btn-group">
            <button id="roll-btn">Бросок</button>
            <button id="reset-btn">Сброс</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        let rollsLeft = 3;
        const DICE_COUNT = 5;
        const DICE_SIZE = 2;
        const diceObjects = [];
        let isRolling = false, isCharging = false, charge = 0;

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 38, 22);
        camera.lookAt(0, -3, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- ФИЗИКА (Повышенная точность) ---
        const world = new CANNON.World();
        world.gravity.set(0, -30, 0);
        world.allowSleep = true;
        world.solver.iterations = 20; // Больше итераций для точности столкновений

        // --- СВЕТ ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const light = new THREE.SpotLight(0xffffff, 0.8);
        light.position.set(10, 40, 10);
        light.castShadow = true;
        scene.add(light);

        // --- АРЕНА (С "толстыми" стенками) ---
        function createSafeArena() {
            // Визуальный пол
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 30),
                new THREE.MeshStandardMaterial({ color: 0x111215 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Физический пол
            const floorBody = new CANNON.Body({ mass: 0 });
            floorBody.addShape(new CANNON.Plane());
            floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
            world.addBody(floorBody);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x22252c });
            
            // Функция создания стены с огромной физической толщиной
            const addWall = (x, z, w, d, isVertical) => {
                const visualHeight = 3;
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, visualHeight, d), wallMat);
                mesh.position.set(x, visualHeight/2, z);
                scene.add(mesh);

                const body = new CANNON.Body({ mass: 0 });
                // Физическая толщина в 10 раз больше визуальной (направлена наружу)
                const physW = isVertical ? 10 : w/2;
                const physD = isVertical ? d/2 : 10;
                body.addShape(new CANNON.Box(new CANNON.Vec3(physW, 5, physD)));
                
                // Сдвигаем центр физического бокса наружу, чтобы внутренняя грань совпала с визуальной
                const offsetX = isVertical ? (x > 0 ? 9.5 : -9.5) : 0;
                const offsetZ = !isVertical ? (z > 0 ? 9.5 : -9.5) : 0;
                body.position.set(x + offsetX, 2, z + offsetZ);
                world.addBody(body);
            };

            addWall(0, -15, 30, 1, false); // Верх
            addWall(0, 15, 30, 1, false);  // Низ
            addWall(-15, 0, 1, 30, true);  // Лево
            addWall(15, 0, 1, 30, true);   // Право
        }
        createSafeArena();

        // --- КУБИКИ ---
        function createTex(n) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff'; ctx.fillRect(0,0,128,128);
            ctx.fillStyle = '#000';
            const pts = { 1:[[64,64]], 2:[[32,32],[96,96]], 3:[[32,32],[64,64],[96,96]], 4:[[32,32],[96,32],[32,96],[96,96]], 5:[[32,32],[96,32],[64,64],[32,96],[96,96]], 6:[[32,32],[96,32],[32,64],[96,64],[32,96],[96,96]] };
            pts[n].forEach(p => { ctx.beginPath(); ctx.arc(p[0], p[1], 12, 0, 7); ctx.fill(); });
            return new THREE.CanvasTexture(canvas);
        }
        const diceMats = [3,4,2,5,1,6].map(n => new THREE.MeshStandardMaterial({ map: createTex(n) }));

        for (let i = 0; i < DICE_COUNT; i++) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(DICE_SIZE, DICE_SIZE, DICE_SIZE), diceMats);
            mesh.castShadow = true;
            scene.add(mesh);
            const body = new CANNON.Body({ mass: 1.2, shape: new CANNON.Box(new CANNON.Vec3(DICE_SIZE/2, DICE_SIZE/2, DICE_SIZE/2)), sleepTimeLimit: 0.1 });
            body.position.set(i*3-6, 1.1, 0);
            world.addBody(body);
            diceObjects.push({ mesh, body, isHeld: false });
        }

        // --- БРОСОК ---
        const rollBtn = document.getElementById('roll-btn');
        const pBar = document.getElementById('power-bar');

        const start = () => { if(!isRolling && rollsLeft > 0) { isCharging = true; charge = 0; document.getElementById('meter').style.display = 'block'; } };
        const end = () => { if(isCharging) { isCharging = false; document.getElementById('meter').style.display = 'none'; launch(); } };

        function launch() {
            isRolling = true; rollsLeft--;
            document.getElementById('rolls-count').innerText = rollsLeft;
            rollBtn.disabled = true;
            
            const power = 15 + (charge / 100) * 30; // Макс скорость ограничена 45

            diceObjects.forEach((d, i) => {
                if (!d.isHeld) {
                    d.body.type = CANNON.Body.DYNAMIC;
                    d.body.wakeUp();
                    // Спавним ВНУТРИ арены у правого борта
                    d.body.position.set(12, 8 + i, (i-2)*3); 
                    d.body.velocity.set(-power, -5, (Math.random()-0.5)*15);
                    d.body.angularVelocity.set(Math.random()*25, Math.random()*25, Math.random()*25);
                }
            });
            setTimeout(wait, 1000);
        }

        function wait() {
            const timer = setInterval(() => {
                const active = diceObjects.some(d => !d.isHeld && d.body.sleepState !== CANNON.Body.SLEEPING && d.body.velocity.length() > 0.2);
                if (!active) { clearInterval(timer); isRolling = false; if(rollsLeft > 0) rollBtn.disabled = false; calc(); }
            }, 200);
        }

        function calc() {
            let sum = 0;
            diceObjects.forEach(d => {
                const directions = [{v:new THREE.Vector3(1,0,0),val:3},{v:new THREE.Vector3(-1,0,0),val:4},{v:new THREE.Vector3(0,1,0),val:2},{v:new THREE.Vector3(0,-1,0),val:5},{v:new THREE.Vector3(0,0,1),val:1},{v:new THREE.Vector3(0,0,-1),val:6}];
                const q = new THREE.Quaternion(d.body.quaternion.x, d.body.quaternion.y, d.body.quaternion.z, d.body.quaternion.w);
                let max = -1, v = 1;
                directions.forEach(dir => { const worldV = dir.v.clone().applyQuaternion(q); if(worldV.y > max) { max = worldV.y; v = dir.val; } });
                sum += v;
            });
            document.getElementById('res-text').innerText = sum;
        }

        // --- ВЫБОР ---
        const ray = new THREE.Raycaster();
        const m = new THREE.Vector2();
        window.addEventListener('mousedown', (e) => {
            if(isRolling) return;
            m.x = (e.clientX / window.innerWidth) * 2 - 1; m.y = -(e.clientY / window.innerHeight) * 2 + 1;
            ray.setFromCamera(m, camera);
            const hits = ray.intersectObjects(diceObjects.map(d => d.mesh));
            if(hits.length > 0) {
                const d = diceObjects.find(obj => obj.mesh === hits[0].object);
                d.isHeld = !d.isHeld;
                if(d.isHeld) {
                    d.mesh.material.forEach(mat => { mat.emissive.setHex(0x3366ff); mat.emissiveIntensity = 0.5; });
                    d.body.type = CANNON.Body.STATIC;
                    d.body.position.set(-12 + diceObjects.indexOf(d)*6, 1.1, -12);
                    d.body.quaternion.set(0,0,0,1);
                } else {
                    d.mesh.material.forEach(mat => mat.emissive.setHex(0));
                    d.body.type = CANNON.Body.DYNAMIC;
                    d.body.wakeUp();
                }
                calc();
            }
        });

        rollBtn.addEventListener('mousedown', start);
        window.addEventListener('mouseup', end);
        document.getElementById('reset-btn').addEventListener('click', () => location.reload());

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();
            diceObjects.forEach(d => { d.mesh.position.copy(d.body.position); d.mesh.quaternion.copy(d.body.quaternion); });
            if(isCharging && charge < 100) { charge += 2; pBar.style.width = charge + '%'; }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
