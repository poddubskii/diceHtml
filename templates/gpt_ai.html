<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dice AI Game</title>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
    "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#050608;
    font-family:Arial;
}
  :root {
        --p-bg: #ecffc1;
        --ai-bg: #ffffff;
        --accent: #4facfe;
        --bonus-bg: #bbbbbb;
        --border-bonus: #4facfe;
      }
#ui{
    position:fixed;
    top:10px;
    left:10px;
    z-index:100;
    color:#fff;
}

button{
    width:120px;
    height:50px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

#roll-btn{
    background:#ff4444;
    color:#fff;
}

#table{
    margin-top:10px;
    background:#fff;
    color:#000;
    border-collapse:collapse;
}

#table td{
    border:1px solid #000;
    padding:5px 10px;
    text-align:center;
    cursor:pointer;
}

.player{
    background:#dff0ff;
}

.ai{
    background:#ffe3e3;
}
 #game-table {
        width: 96vw;
        max-width: 480px;
        background: #add8e6;
        display: grid;
        grid-template-columns: 35px repeat(4, 1fr) repeat(4, 1fr);
        border: 2px solid #000;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      /* Заголовок-ручка для перетаскивания */
      .drag-handle {
        cursor: move;
        border-bottom: 2px solid #000 !important;
      }

      .cell {
        border: 0.5px solid rgba(0, 0, 0, 0.2);
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: bold;
        position: relative;
      }
      .row-label {
        background: #c0c0c0;
        color: #333;
        justify-content: flex-start;
        padding-left: 3px;
      }

      .p-col {
        background: #ffffff;
        color: var(--accent);
      }
      .a-col {
        background: var(--ai-bg);
        color: #000;
      }

      /* Выделение бонусов */

      .row_bonus {
        background-color: rgba(0, 255, 128, 0.1) !important;
      }
      .col_bonus {
        background-color: rgb(192 192 192) !important;
        /* border-left: 1px solid gold !important; */
      }

      /* Рука */
      .hand {
        position: absolute;
        top: -20px;
        font-size: 18px;
        display: none;
      }
      .active-turn .hand {
        display: block;
        animation: bounce 0.6s infinite alternate;
      }
      @keyframes bounce {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-5px);
        }
      }
</style>
</head>

<body>

<div id="ui">
    <button id="roll-btn">БРОСОК</button>
<div id="game-table">
 <div class="cell row-label">№</div>
        <div
          class="cell p-col active-turn drag-handle"
          style="grid-column: span 4"
          id="p-header"
        >
          <span class="hand">👆</span> PLAYER
        </div>
        <div
          class="cell a-col drag-handle"
          style="grid-column: span 4"
          id="a-header"
        >
          <span class="hand">👆</span> AI
        </div>
 </div>
</div>

<script type="module">

import * as THREE from "three";
import * as CANNON from "cannon-es";



      let rollsLeft = 3;
      const diceObjects = [];
      let isRolling = false,
        isCharging = false,
        charge = 0;

      const CATEGORIES = [
        { id: "r1", n: "1" },
        { id: "r2", n: "2" },
        { id: "r3", n: "3" },
        { id: "r4", n: "4" },
        { id: "r5", n: "5" },
        { id: "r6", n: "6" },
        { id: "school-bonus", n: "" },
        { id: "pair", n: "Para" },
        { id: "two", n: "2+2" },
        { id: "set", n: "▲" },
        { id: "sq", n: "■" },
        { id: "full", n: "Full" },
        { id: "lstr", n: "LStr" },
        { id: "bstr", n: "BStr" },
        { id: "pok", n: "Poker" },
        { id: "ch", n: "💲" },
        { id: "game-bonus", n: "" },
      ];

      // Добавили 4-й объект в массивы p и a для премий
      let game = {
        p: [{}, {}, {}, {}],
        a: [{}, {}, {}, {}],
        rolls: 3,
        turn: "p",
        locked: false,
      };

      // --- ГЕНЕРАЦИЯ ТАБЛИЦЫ ---
      const table = document.getElementById("game-table");
      let rowIndex = 0; // Инициализируем счетчик строк перед циклом
      CATEGORIES.forEach((cat) => {
        // 1. Создаем заголовок строки (№)
        const lbl = document.createElement("div");
        lbl.className = "cell row-label";
        lbl.innerText = cat.n;
        table.appendChild(lbl);

        // 2. Вспомогательная функция для стилей
        const applyStyles = (cell, colIndex) => {
          if (rowIndex === 0) cell.classList.add("row_bonus_head");
          if (rowIndex === 6 || rowIndex === 16)
            cell.classList.add("row_bonus");
          if (colIndex === 3) cell.classList.add("col_bonus");
        };

        // 3. Создаем столбцы Игрока (0, 1, 2, 3-премия)
        for (let i = 0; i < 4; i++) {
          const c = document.createElement("div");
          c.className = "cell p-col";
          c.id = `p_${i}_${cat.id}`;
          c.onclick = () => onCellClick(i, cat.id);

          applyStyles(c, i); // Применяем выделение
          table.appendChild(c);
        }

        // 4. Создаем столбцы ИИ (0, 1, 2, 3-премия)
        for (let i = 0; i < 4; i++) {
          const c = document.createElement("div");
          c.className = "cell a-col";
          c.id = `a_${i}_${cat.id}`;

          applyStyles(c, i); // Применяем выделение
          table.appendChild(c);
        }

        rowIndex++; // Переходим к следующей строке ПОСЛЕ отрисовки всех колонок
      });

      // --- ЛОГИКА ПЕРЕДВИЖЕНИЯ ТАБЛИЦЫ ---
      const win = document.getElementById("window-container");
      const handles = document.querySelectorAll(".drag-handle");
      let isDragging = false,
        offset = { x: 0, y: 0 };

      const startDrag = (e) => {
        isDragging = true;
        const clientX = e.type.includes("touch")
          ? e.touches[0].clientX
          : e.clientX;
        const clientY = e.type.includes("touch")
          ? e.touches[0].clientY
          : e.clientY;
        offset.x = clientX - win.offsetLeft;
        offset.y = clientY - win.offsetTop;
      };

      const doDrag = (e) => {
        if (!isDragging) return;
        const clientX = e.type.includes("touch")
          ? e.touches[0].clientX
          : e.clientX;
        const clientY = e.type.includes("touch")
          ? e.touches[0].clientY
          : e.clientY;
        win.style.left = clientX - offset.x + "px";
        win.style.top = clientY - offset.y + "px";
      };

      handles.forEach((h) => {
        h.addEventListener("mousedown", startDrag);
        h.addEventListener("touchstart", startDrag);
      });
      window.addEventListener("mousemove", doDrag);
      window.addEventListener("touchmove", doDrag, { passive: false });
      window.addEventListener("mouseup", () => (isDragging = false));
      window.addEventListener("touchend", () => (isDragging = false));

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(0,25,25);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
light.castShadow = true;

scene.add(light);

const world = new CANNON.World();
world.gravity.set(0,-30,0);

const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({color:0x0d5c2b})
);

floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;

scene.add(floor);

const floorBody = new CANNON.Body({
    mass:0,
    shape:new CANNON.Plane()
});

floorBody.quaternion.setFromEuler(-Math.PI/2,0,0);

world.addBody(floorBody);

function createDiceTexture(n){

    const canvas = document.createElement("canvas");
    canvas.width = 128;
    canvas.height = 128;

    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#fff";
    ctx.fillRect(0,0,128,128);

    ctx.fillStyle = "#000";

    const dots = {
        1:[[64,64]],
        2:[[32,32],[96,96]],
        3:[[32,32],[64,64],[96,96]],
        4:[[32,32],[96,32],[32,96],[96,96]],
        5:[[32,32],[96,32],[64,64],[32,96],[96,96]],
        6:[[32,32],[96,32],[32,64],[96,64],[32,96],[96,96]]
    };

    dots[n].forEach(p=>{
        ctx.beginPath();
        ctx.arc(p[0],p[1],12,0,Math.PI*2);
        ctx.fill();
    });

    return new THREE.CanvasTexture(canvas);
}

const materials = [3,4,2,5,1,6].map(n=>
    new THREE.MeshStandardMaterial({
        map:createDiceTexture(n)
    })
);



for(let i=0;i<5;i++){

    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(2,2,2),
        materials
    );

    mesh.castShadow = true;

    scene.add(mesh);

    const body = new CANNON.Body({
        mass:1,
        shape:new CANNON.Box(new CANNON.Vec3(1,1,1))
    });

    body.position.set(i*3-6,5,0);

    world.addBody(body);

    diceObjects.push({
        mesh,
        body,
        isHeld:false,
        heldValue:0
    });
}

/////////////////////////////
	function onCellClick(col, category) {
	  if (game.turn !== 'p') return;

	  const vals = getDiceValues();
	  const result = calculateBestCategory(vals);

	  const cell = document.getElementById(`p_${col}_${category}`);

	  if (!cell || cell.innerText) return;

	  cell.innerText = result.score;

	  game.p[col][category] = result.score;

	  diceObjects.forEach((d) => {
		d.isHeld = false;

		d.mesh.material.forEach((mt) => {
		  mt.emissive.setHex(0x000000);
		});

		d.body.type = CANNON.Body.DYNAMIC;
	  });

	  setTimeout(() => {
		game.turn = 'a';

		document.getElementById('p-header').classList.remove('active-turn');
		document.getElementById('a-header').classList.add('active-turn');

		aiTurn();
	  }, 1000);
	}

	function getDiceValue(body){

		const dirs = [
			{v:new THREE.Vector3(1,0,0),val:3},
			{v:new THREE.Vector3(-1,0,0),val:4},
			{v:new THREE.Vector3(0,1,0),val:2},
			{v:new THREE.Vector3(0,-1,0),val:5},
			{v:new THREE.Vector3(0,0,1),val:1},
			{v:new THREE.Vector3(0,0,-1),val:6},
		];

		const q = new THREE.Quaternion(
			body.quaternion.x,
			body.quaternion.y,
			body.quaternion.z,
			body.quaternion.w
		);

		let max = -1;
		let value = 1;

		dirs.forEach(d=>{

			const w = d.v.clone().applyQuaternion(q);

			if(w.y > max){
				max = w.y;
				value = d.val;
			}

		});

		return value;
	}
function getDiceValues() {
  return diceObjects.map((d) => (d.isHeld ? d.heldValue : getValues(d.body)));
}
	function getValues(){

		return diceObjects.map(d=>
			d.isHeld ? d.heldValue : getDiceValue(d.body)
		);
	}

function rollDice(){

    diceObjects.forEach((d,i)=>{

        if(!d.isHeld){

            d.body.position.set(
                Math.random()*4-2,
                10+i,
                Math.random()*4-2
            );

            d.body.velocity.set(
                Math.random()*20-10,
                0,
                Math.random()*20-10
            );

            d.body.angularVelocity.set(
                Math.random()*10,
                Math.random()*10,
                Math.random()*10
            );

            d.body.wakeUp();
        }

    });

}

document.getElementById("roll-btn")
.addEventListener("click",()=>{

    rollDice();

    setTimeout(()=>{
        playerWrite();
    },2000);

});

function countMap(vals){

    const map = {};

    vals.forEach(v=>{
        map[v]=(map[v]||0)+1;
    });

    return map;
}

function calcResult(vals){

    const counts = countMap(vals);

    const sum = vals.reduce((a,b)=>a+b,0);

    if(Object.values(counts).includes(5)){
        return {id:"pok",score:50};
    }

    if(Object.values(counts).includes(4)){
        return {id:"sq",score:sum};
    }

    if(Object.values(counts).includes(3)){
        return {id:"set",score:sum};
    }

    if(Object.values(counts).includes(2)){
        return {id:"pair",score:sum};
    }

    return {id:"ch",score:sum};
}

function playerWrite(){

    const vals = getValues();

    const res = calcResult(vals);

    const cell = document.getElementById(
        `p_${res.id}`
    );

    if(!cell.innerText){

        cell.innerText = res.score;

    }

    setTimeout(()=>{
        aiTurn();
    },1000);
}

async function aiTurn(){

    resetDice();

    for(let i=0;i<3;i++){

        rollDice();

        await waitStop();

        aiChoose();
    }

    aiWrite();
}

function aiChoose(){

    const vals = getValues();

    const counts = countMap(vals);

    let best = null;
    let bestCount = 0;

    Object.entries(counts).forEach(([v,c])=>{

        if(c > bestCount){

            best = Number(v);
            bestCount = c;

        }

    });

    diceObjects.forEach(d=>{

        const val = getDiceValue(d.body);

        if(val === best){

            d.isHeld = true;
            d.heldValue = val;

            d.body.sleep();

            d.mesh.material.forEach(m=>{
                m.emissive.setHex(0xff0000);
            });

        }

    });

}

function aiWrite(){

    const vals = getValues();

    const res = calcResult(vals);

    const cell = document.getElementById(
        `a_${res.id}`
    );

    if(!cell.innerText){

        cell.innerText = res.score;

    }

    resetDice();
}

function resetDice(){

    diceObjects.forEach(d=>{

        d.isHeld = false;

        d.mesh.material.forEach(m=>{
            m.emissive.setHex(0x000000);
        });

    });

}

function waitStop(){

    return new Promise(resolve=>{

        setTimeout(()=>{
            resolve();
        },1800);

    });

}

function animate(){

    requestAnimationFrame(animate);

    world.step(1/60);

    diceObjects.forEach(d=>{

        d.mesh.position.copy(d.body.position);
        d.mesh.quaternion.copy(d.body.quaternion);

    });

    renderer.render(scene,camera);
}

function countValues(vals) {
  const map = {};
  vals.forEach((v) => {
    map[v] = (map[v] || 0) + 1;
  });
  return map;
}

function aiChooseDice() {
  game.turn = 'p';

  document.getElementById('a-header').classList.remove('active-turn');
  document.getElementById('p-header').classList.add('active-turn');

  rollsLeft = 3;
  document.getElementById('rolls-count').innerText = rollsLeft;

  rollBtn.disabled = false;
}

function waitDiceStop() {
  return new Promise((resolve) => {
    const interval = setInterval(() => {
      const moving = diceObjects.some(
        (d) =>
          !d.isHeld &&
          d.body.velocity.length() > 0.3
      );

      if (!moving) {
        clearInterval(interval);
        resolve();
      }
    }, 200);
  });
}

function calculateBestCategory(vals) {
  const counts = countValues(vals);
  const sum = vals.reduce((a, b) => a + b, 0);

  // Покер
  if (Object.values(counts).includes(5)) {
    return { id: 'pok', score: 50 };
  }

  // Каре
  if (Object.values(counts).includes(4)) {
    return { id: 'sq', score: sum };
  }

  // Сет
  if (Object.values(counts).includes(3)) {
    return { id: 'set', score: sum };
  }

  // Пара
  if (Object.values(counts).includes(2)) {
    return { id: 'pair', score: sum };
  }

  return { id: 'ch', score: sum };
}

function aiWriteScore() {
  const vals = getDiceValues();
  const result = calculateBestCategory(vals);

  for (let col = 0; col < 3; col++) {
    const key = `a_${col}_${result.id}`;
    const cell = document.getElementById(key);

    if (cell && !cell.innerText) {
      cell.innerText = result.score;
      game.a[col][result.id] = result.score;
      break;
    }
  }
}
animate();

window.addEventListener("resize",()=>{

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
