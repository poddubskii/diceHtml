<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Triple Poker Dice</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
    <style>
        :root { --bg-green: #006400; --table-blue: #add8e6; --p1-dark: #122100; --ai-white: #ffffff; }
        body { margin: 0; overflow: hidden; background: var(--bg-green); font-family: sans-serif; user-select: none; touch-action: none; }
        
        /* HEADER */
        #header { 
            position: fixed; top: 0; width: 100%; background: #000; color: white; z-index: 100;
            display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid #fff;
        }
        .top-row { display: flex; justify-content: space-between; width: 95%; padding: 5px; font-size: 12px; color: #0f0; }
        .score-row { display: flex; justify-content: space-around; width: 100%; padding: 5px 0; font-size: 24px; font-weight: 900; }
        .progress-bar { width: 100%; height: 20px; background: #333; position: relative; border-top: 1px solid #555; }
        #progress-fill { width: 0%; height: 100%; background: #2e7d32; transition: 0.3s; }
        #progress-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 14px; font-weight: bold; }

        /* TABLE OVERLAY */
        #ui-layer { position: absolute; top: 85px; left: 0; width: 100%; display: flex; justify-content: center; pointer-events: none; z-index: 50; }
        #dice-table { 
            width: 98%; max-width: 480px; background: var(--table-blue); display: grid; 
            grid-template-columns: 50px repeat(3, 1fr) repeat(3, 1fr); 
            border: 1px solid #000; pointer-events: auto;
        }
        .cell { border: 0.1px solid rgba(0,0,0,0.2); height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .label { background: #d0d0d0; justify-content: flex-start; padding-left: 4px; font-size: 10px; color: #000; }
        .p-col { background: var(--p1-dark); color: #4facfe; }
        .a-col { background: var(--ai-white); color: #000; }
        .hint { background: #ffeb3b !important; color: #000 !important; cursor: pointer; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .locked { color: #fff !important; }
        .ai-locked { color: #00f !important; }

        /* CONTROLS */
        #controls { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #roll-btn { 
            width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle, #ff3333, #800000);
            border: 4px solid #fff; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        #roll-btn:disabled { filter: grayscale(1); opacity: 0.6; }
        #status-msg { color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="header">
    <div class="top-row">
        <span id="cur-date">07.05.2026</span>
        <span id="cur-time">16:53:01</span>
        <span>❓ ⚙️ ❌</span>
    </div>
    <div class="score-row">
        <span>🪐 <span id="p-total">0</span></span>
        <span>Swan <span id="a-total">0</span></span>
    </div>
    <div class="progress-bar">
        <div id="progress-fill"></div>
        <div id="progress-text">0 / 90</div>
    </div>
</div>

<div id="ui-layer">
    <div id="dice-table"></div>
</div>

<div id="controls">
    <div id="status-msg">Твой ход</div>
    <button id="roll-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/1041/1041077.png" width="30" style="filter:invert(1)">
        ROLL
    </button>
</div>

<script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'cannon-es';

    // --- КОНФИГУРАЦИЯ ТАБЛИЦЫ ---
    const ROWS = [
        {id:'r1', n:'1'}, {id:'r2', n:'2'}, {id:'r3', n:'3'}, {id:'r4', n:'4'}, {id:'r5', n:'5'}, {id:'r6', n:'6'},
        {id:'b1', n:'🎁'},
        {id:'pair', n:'Para'}, {id:'two', n:'2+2'}, {id:'set', n:'▲'}, {id:'sq', n:'■'},
        {id:'full', n:'Full'}, {id:'lstr', n:'LStr'}, {id:'bstr', n:'BStr'}, {id:'pok', n:'P'}, {id:'ch', n:'$'},
        {id:'b2', n:'🎁'}
    ];

    let gameState = {
        p: [{}, {}, {}], // 3 колонки игрока
        a: [{}, {}, {}], // 3 колонки ИИ
        turns: 0,
        rollsLeft: 3,
        currentPlayer: 'p'
    };

    function initTable() {
        const container = document.getElementById('dice-table');
        container.innerHTML = `<div class="cell label">№</div><div class="cell p-col" style="grid-column: span 3">PLAYER</div><div class="cell a-col" style="grid-column: span 3">AI</div>`;
        ROWS.forEach(row => {
            container.innerHTML += `<div class="cell label">${row.n}</div>`;
            for(let i=0; i<3; i++) container.innerHTML += `<div class="cell p-col" id="p_${i}_${row.id}"></div>`;
            for(let i=0; i<3; i++) container.innerHTML += `<div class="cell a-col" id="a_${i}_${row.id}"></div>`;
        });
    }
    initTable();

    // --- ТРЕХМЕРНАЯ ГРАФИКА И ФИЗИКА ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.set(0, 45, 18);
    camera.lookAt(0, -10, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const world = new CANNON.World();
    world.gravity.set(0, -60, 0);

    // Материалы
    const dMat = new CANNON.Material();
    const gMat = new CANNON.Material();
    world.addContactMaterial(new CANNON.ContactMaterial(dMat, gMat, { restitution: 0.5, friction: 0.1 }));

    // Пол
    const floorB = new CANNON.Body({ mass: 0, material: gMat });
    floorB.addShape(new CANNON.Plane());
    floorB.quaternion.setFromEuler(-Math.PI/2, 0, 0);
    world.addBody(floorB);

    // Стенки
    const addW = (x,z,w,d) => { 
        const b = new CANNON.Body({ mass: 0 }); 
        b.addShape(new CANNON.Box(new CANNON.Vec3(w, 10, d))); 
        b.position.set(x, 0, z); world.addBody(b); 
    };
    addW(0, -18, 20, 1); addW(0, 15, 20, 1); addW(-12, 0, 1, 20); addW(12, 0, 1, 20);

    // Кубики
    const dice = [];
    const createTex = (n) => {
        const c = document.createElement('canvas'); c.width=64; c.height=64;
        const ctx = c.getContext('2d'); ctx.fillStyle='white'; ctx.fillRect(0,0,64,64); ctx.fillStyle='red';
        const pts = {1:[[32,32]],2:[[16,16],[48,48]],3:[[16,16],[32,32],[48,48]],4:[[16,16],[48,16],[16,48],[48,48]],5:[[16,16],[48,16],[32,32],[16,48],[48,48]],6:[[16,16],[48,16],[16,32],[48,32],[16,48],[48,48]]};
        pts[n].forEach(p => { ctx.beginPath(); ctx.arc(p[0],p[1],6,0,7); ctx.fill(); });
        return new THREE.CanvasTexture(c);
    };
    const diceMats = [3,4,2,5,1,6].map(n => new THREE.MeshStandardMaterial({ map: createTex(n) }));

    for(let i=0; i<5; i++) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(2.4, 2.4, 2.4), diceMats);
        mesh.castShadow = true; scene.add(mesh);
        const body = new CANNON.Body({ mass: 2, shape: new CANNON.Box(new CANNON.Vec3(1.2, 1.2, 1.2)), material: dMat });
        body.position.set(i*3-6, 1.5, 10);
        world.addBody(body);
        dice.push({ mesh, body, held: false });
    }

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(5, 30, 5); sun.castShadow=true; scene.add(sun);

    // --- ЛОГИКА ИГРЫ ---

    function getDiceResults() {
        return dice.map(d => {
            const q = new THREE.Quaternion(d.body.quaternion.x, d.body.quaternion.y, d.body.quaternion.z, d.body.quaternion.w);
            const ups = [{v:new THREE.Vector3(1,0,0),n:3},{v:new THREE.Vector3(-1,0,0),n:4},{v:new THREE.Vector3(0,1,0),n:2},{v:new THREE.Vector3(0,-1,0),n:5},{v:new THREE.Vector3(0,0,1),n:1},{v:new THREE.Vector3(0,0,-1),n:6}];
            let max = -1, val = 1;
            ups.forEach(u => { const cur = u.v.clone().applyQuaternion(q).y; if(cur > max) { max = cur; val = u.n; } });
            return val;
        });
    }

    function calcPotential(vals) {
        const counts = {}; vals.forEach(v => counts[v] = (counts[v] || 0) + 1);
        const c = Object.values(counts).sort((a,b)=>b-a);
        const sum = vals.reduce((a,b)=>a+b, 0);
        const unique = [...new Set(vals)].sort();
        const isStr = (arr, len) => {
            let count = 1, max = 1;
            for(let i=0; i<arr.length-1; i++) {
                if(arr[i+1] === arr[i]+1) { count++; max = Math.max(max, count); } else count = 1;
            }
            return max >= len;
        };

        return {
            r1: (counts[1]||0)*1, r2: (counts[2]||0)*2, r3: (counts[3]||0)*3, r4: (counts[4]||0)*4, r5: (counts[5]||0)*5, r6: (counts[6]||0)*6,
            pair: c[0] >= 2 ? sum : 0,
            two: c[0] >= 2 && c[1] >= 2 ? sum : 0,
            set: c[0] >= 3 ? sum : 0,
            sq: c[0] >= 4 ? sum : 0,
            full: (c[0] === 3 && c[1] === 2) ? sum : 0,
            lstr: isStr(unique, 4) ? 30 : 0,
            bstr: isStr(unique, 5) ? 40 : 0,
            pok: c[0] === 5 ? 50 : 0,
            ch: sum
        };
    }

    const rollBtn = document.getElementById('roll-btn');
    
    function throwDice() {
        if(gameState.rollsLeft <= 0) return;
        gameState.rollsLeft--;
        rollBtn.disabled = true;
        document.getElementById('status-msg').innerText = `Бросок... (Осталось: ${gameState.rollsLeft})`;

        dice.forEach((d, i) => {
            if(!d.held) {
                d.body.type = CANNON.Body.DYNAMIC;
                d.body.position.set((Math.random()-0.5)*5, 15 + i, (Math.random()-0.5)*5);
                d.body.velocity.set((Math.random()-0.5)*20, -20, (Math.random()-0.5)*40);
                d.body.angularVelocity.set(Math.random()*20, Math.random()*20, Math.random()*20);
                d.body.wakeUp();
            }
        });

        setTimeout(() => {
            const check = setInterval(() => {
                const stillMoving = dice.some(d => d.body.velocity.length() > 0.2);
                if(!stillMoving) {
                    clearInterval(check);
                    onDiceStop();
                }
            }, 200);
        }, 1000);
    }

    function onDiceStop() {
        const vals = getDiceResults();
        const pot = calcPotential(vals);
        
        if(gameState.currentPlayer === 'p') {
            showHints(pot);
            if(gameState.rollsLeft > 0) rollBtn.disabled = false;
            else document.getElementById('status-msg').innerText = "Выбери ячейку в таблице!";
        } else {
            // Логика ИИ
            setTimeout(() => autoAiSelect(pot), 1000);
        }
    }

    function showHints(pot) {
        clearHints();
        for(let col=0; col<3; col++) {
            for(let rowId in pot) {
                const cellId = `p_${col}_${rowId}`;
                const cell = document.getElementById(cellId);
                if(gameState.p[col][rowId] === undefined) {
                    const score = pot[rowId];
                    cell.innerText = score === 0 ? 'X' : score;
                    cell.classList.add('hint');
                    cell.onclick = () => finalizeScore('p', col, rowId, score);
                }
            }
        }
    }

    function finalizeScore(player, col, rowId, score) {
        gameState[player][col][rowId] = score;
        const cell = document.getElementById(`${player}_${col}_${rowId}`);
        cell.innerText = score === 0 ? 'X' : score;
        cell.classList.remove('hint');
        cell.classList.add(player === 'p' ? 'locked' : 'ai-locked');
        cell.onclick = null;

        clearHints();
        updateTotals();
        
        gameState.turns++;
        updateProgress();

        if(player === 'p') {
            gameState.currentPlayer = 'a';
            gameState.rollsLeft = 1; // У ИИ один бросок для простоты
            document.getElementById('status-msg').innerText = "Ход лебедя (ИИ)...";
            setTimeout(throwDice, 1000);
        } else {
            gameState.currentPlayer = 'p';
            gameState.rollsLeft = 3;
            document.getElementById('status-msg').innerText = "Твой ход";
            rollBtn.disabled = false;
            resetDicePos();
        }
    }

    function autoAiSelect(pot) {
        // ИИ просто выбирает первую свободную ячейку с максимальным баллом
        let best = {col:0, row:'', score:-1};
        for(let c=0; c<3; c++) {
            for(let rId in pot) {
                if(gameState.a[c][rId] === undefined && pot[rId] > best.score) {
                    best = {col:c, row:rId, score:pot[rId]};
                }
            }
        }
        // Если ничего не нашел (все по 0), берет первую свободную
        if(best.row === '') {
             for(let c=0; c<3; c++) {
                for(let rId in pot) {
                    if(gameState.a[c][rId] === undefined) { best = {col:c, row:rId, score:0}; break; }
                }
                if(best.row !== '') break;
             }
        }
        finalizeScore('a', best.col, best.row, best.score);
    }

    function clearHints() {
        document.querySelectorAll('.hint').forEach(el => {
            el.classList.remove('hint');
            el.innerText = '';
            el.onclick = null;
        });
    }

    function updateTotals() {
        const sum = (player) => gameState[player].reduce((acc, col) => acc + Object.values(col).reduce((a,b)=>a+b, 0), 0);
        document.getElementById('p-total').innerText = sum('p');
        document.getElementById('a-total').innerText = sum('a');
    }

    function updateProgress() {
        const p = (gameState.turns / 90) * 100;
        document.getElementById('progress-fill').style.width = p + '%';
        document.getElementById('progress-text').innerText = `${gameState.turns} / 90`;
    }

    function resetDicePos() {
        dice.forEach((d, i) => {
            d.body.type = CANNON.Body.STATIC;
            d.body.position.set(i*3-6, 1.5, 10);
            d.body.quaternion.set(0,0,0,1);
        });
    }

    // --- ЦИКЛ ---
    function animate() {
        requestAnimationFrame(animate);
        world.step(1/60);
        dice.forEach(d => {
            d.mesh.position.copy(d.body.position);
            d.mesh.quaternion.copy(d.body.quaternion);
        });
        renderer.render(scene, camera);
    }
    
    rollBtn.onclick = throwDice;
    animate();

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });

</script>
</body>
</html>
