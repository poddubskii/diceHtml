<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Dice: Реалистичный бросок | Точные значения</title>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0c12;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            touch-action: pan-x pan-y;
        }
        #res {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ffd966;
            font-size: 26px;
            font-weight: 800;
            z-index: 200;
            text-shadow: 2px 2px 8px #000000cc;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 10px 0;
            font-family: monospace;
            pointer-events: none;
            letter-spacing: 1px;
        }
        #ui {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            width: 85%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .meter-container {
            width: 100%;
            height: 14px;
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            border: 1px solid #ffc107;
            overflow: hidden;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px black;
            display: none;
        }
        #power-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f39c12, #e67e22, #e74c3c);
            border-radius: 20px;
            transition: width 0.02s linear;
        }
        button {
            width: 100%;
            padding: 18px 20px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 60px;
            border: none;
            background: #e67e22;
            color: white;
            box-shadow: 0 7px 0 #b45f1b;
            transition: 0.05s linear;
            font-family: inherit;
            letter-spacing: 2px;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #b45f1b;
        }
        #info {
            position: fixed;
            bottom: 115px;
            left: 0;
            right: 0;
            text-align: center;
            color: #bbb;
            font-size: 12px;
            background: rgba(0,0,0,0.55);
            width: fit-content;
            margin: 0 auto;
            padding: 5px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            button { padding: 14px; font-size: 20px; }
            #res { font-size: 18px; top: 12px; }
            #info { bottom: 130px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="res">🎲 ЗАЖМИ КНОПКУ — НАБЕРИ СИЛУ 🎲</div>
    <div id="ui">
        <div class="meter-container" id="meter">
            <div id="power-bar"></div>
        </div>
        <button id="roll-btn">🎲 БРОСИТЬ 🎲</button>
    </div>
    <div id="info">💡 Держи кнопку → сила броска. Кубики летят справа налево, сверху вниз! Высокие борта не дают вылететь.</div>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0c12);
        scene.fog = new THREE.FogExp2(0x0a0c12, 0.008);
        
        const camera = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.1, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // --- ОСВЕЩЕНИЕ ---
        const ambient = new THREE.AmbientLight(0x404060, 0.7);
        scene.add(ambient);
        
        const mainLight = new THREE.DirectionalLight(0xfff2e0, 1.2);
        mainLight.position.set(12, 25, 10);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 45;
        mainLight.shadow.camera.left = -14;
        mainLight.shadow.camera.right = 14;
        mainLight.shadow.camera.top = 14;
        mainLight.shadow.camera.bottom = -14;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0xccaa77, 0.5);
        fillLight.position.set(-5, 12, -8);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0x88aacc, 0.55);
        rimLight.position.set(6, 10, -12);
        scene.add(rimLight);
        
        const groundFill = new THREE.PointLight(0x5a7a5a, 0.35);
        groundFill.position.set(0, -2, 0);
        scene.add(groundFill);
        
        // Декоративная сетка
        const gridHelper = new THREE.GridHelper(80, 24, 0x88aaff, 0x446688);
        gridHelper.position.y = -0.1;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        // --- ФИЗИКА (НОРМАЛЬНАЯ ГРАВИТАЦИЯ, БЕЗ ЗАМЕДЛЕНИЯ)---
        const world = new CANNON.World();
        world.gravity = new CANNON.Vec3(0, -14.0, 0);  // земная гравитация, нормальная скорость падения
        world.broadphase = new CANNON.NaiveBroadphase();
        world.defaultContactMaterial.restitution = 0.5;
        
        // Материалы
        const diceMat = new CANNON.Material('dice');
        const floorMat = new CANNON.Material('floor');
        const wallMat = new CANNON.Material('wall');
        
        // Контакты
        const diceFloorContact = new CANNON.ContactMaterial(diceMat, floorMat, {
            friction: 0.55,
            restitution: 0.56,
            contactEquationStiffness: 1e8,
        });
        world.addContactMaterial(diceFloorContact);
        
        const diceWallContact = new CANNON.ContactMaterial(diceMat, wallMat, {
            friction: 0.4,
            restitution: 0.5,
        });
        world.addContactMaterial(diceWallContact);
        
        world.defaultContactMaterial.material1 = diceMat;
        world.defaultContactMaterial.material2 = floorMat;
        
        // ---- ПОЛ (физическая платформа) ----
        const floorBody = new CANNON.Body({
            mass: 0,
            material: floorMat,
            shape: new CANNON.Box(new CANNON.Vec3(32, 0.4, 32)),
        });
        floorBody.position.set(0, -1.1, 0);
        world.addBody(floorBody);
        
        // Визуальное покрытие (сукно)
        const tableMaterial = new THREE.MeshStandardMaterial({ color: 0x1a4a2a, roughness: 0.7, metalness: 0.05, side: THREE.DoubleSide });
        const visualFloor = new THREE.Mesh(new THREE.PlaneGeometry(64, 64), tableMaterial);
        visualFloor.rotation.x = -Math.PI / 2;
        visualFloor.position.y = -1.05;
        visualFloor.receiveShadow = true;
        scene.add(visualFloor);
        
        // Декоративное кольцо в центре
        const centerRing = new THREE.Mesh(
            new THREE.RingGeometry(10, 28, 32),
            new THREE.MeshStandardMaterial({ color: 0xaa8c54, roughness: 0.5, metalness: 0.3, side: THREE.DoubleSide })
        );
        centerRing.rotation.x = -Math.PI / 2;
        centerRing.position.y = -1.02;
        centerRing.receiveShadow = true;
        scene.add(centerRing);
        
        // ---- ВЫСОКИЕ БОРТА (чтобы кубики гарантированно не вылетали) ----
        const wallHeight = 2.8;      // высокие борта
        const wallThick = 1.0;
        const arenaSize = 30;        // полусфера влияния
        
        const addWall = (x, z, sx, sz) => {
            const wallBody = new CANNON.Body({
                mass: 0,
                material: wallMat,
                shape: new CANNON.Box(new CANNON.Vec3(sx/2, wallHeight/2, sz/2)),
            });
            wallBody.position.set(x, wallHeight/2, z);
            world.addBody(wallBody);
            
            const wallMesh = new THREE.Mesh(
                new THREE.BoxGeometry(sx, wallHeight, sz),
                new THREE.MeshStandardMaterial({ color: 0x9b7b5c, roughness: 0.45, metalness: 0.1 })
            );
            wallMesh.position.set(x, wallHeight/2, z);
            wallMesh.castShadow = true;
            wallMesh.receiveShadow = true;
            scene.add(wallMesh);
        };
        
        // Создаём высокие борта по периметру
        addWall(-arenaSize, 0, wallThick, arenaSize * 2 + 2);
        addWall(arenaSize, 0, wallThick, arenaSize * 2 + 2);
        addWall(0, -arenaSize, arenaSize * 2 + 2, wallThick);
        addWall(0, arenaSize, arenaSize * 2 + 2, wallThick);
        
        // Угловые декоративные столбы
        const pillarMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c });
        const cornersPos = [[-29, -29], [29, -29], [-29, 29], [29, 29]];
        cornersPos.forEach(([x, z]) => {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 1.2), pillarMat);
            pillar.position.set(x, 0.5, z);
            pillar.castShadow = true;
            scene.add(pillar);
        });
        
        // --- СОЗДАНИЕ КУБИКОВ (5 штук, улучшенные текстуры)---
        const diceMeshes = [];
        const diceBodies = [];
        const DICE_COUNT = 5;
        const DICE_SIZE = 2.2;
        
        // Функция создания текстуры грани (чёткие точки)
        const createFaceTexture = (number, bgColor = '#fff8ed', dotColor = '#1e2a3a') => {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Фон с лёгким градиентом
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Рамка
            ctx.strokeStyle = '#cbb886';
            ctx.lineWidth = 14;
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            
            ctx.fillStyle = dotColor;
            const cx = canvas.width/2, cy = canvas.height/2;
            const radius = canvas.width * 0.095;
            const offset = canvas.width * 0.28;
            
            const drawDot = (x, y) => {
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
                // блик
                ctx.fillStyle = '#5a6a7a';
                ctx.beginPath();
                ctx.arc(x - 5, y - 5, radius * 0.25, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = dotColor;
            };
            
            // Расположение точек по стандарту игральных костей
            if (number === 1 || number === 3 || number === 5) drawDot(cx, cy);
            if (number === 2 || number === 3 || number === 4 || number === 5 || number === 6) {
                drawDot(cx - offset, cy - offset);
                drawDot(cx + offset, cy + offset);
            }
            if (number === 4 || number === 5 || number === 6) {
                drawDot(cx - offset, cy + offset);
                drawDot(cx + offset, cy - offset);
            }
            if (number === 6) {
                drawDot(cx - offset, cy);
                drawDot(cx + offset, cy);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return new THREE.MeshStandardMaterial({ map: texture, roughness: 0.25, metalness: 0.05 });
        };
        
        const faceMaterials = [1, 2, 3, 4, 5, 6].map(n => createFaceTexture(n));
        
        // ПРАВИЛЬНОЕ ОПРЕДЕЛЕНИЕ ВЫПАВШЕГО НОМИНАЛА
        // Стандартная разметка кубика: ось Y+ = 5, Y- = 2; X+ = 4, X- = 3; Z+ = 6, Z- = 1
        function getDiceValue(body) {
            const quat = body.quaternion;
            // Локальный вектор "вверх" (0,1,0) в мировой системе
            const localUp = new CANNON.Vec3(0, 1, 0);
            const worldUp = quat.vmult(localUp);
            
            // Также проверим оси X и Z для определения наиболее направленной вверх грани
            const absX = Math.abs(worldUp.x);
            const absY = Math.abs(worldUp.y);
            const absZ = Math.abs(worldUp.z);
            
            // Какая ось максимально вертикальна?
            if (absY > absX && absY > absZ) {
                // верхняя или нижняя грань
                return worldUp.y > 0 ? 5 : 2;
            }
            if (absX > absY && absX > absZ) {
                // правая/левая грань
                return worldUp.x > 0 ? 4 : 3;
            }
            if (absZ > absY && absZ > absX) {
                // передняя/задняя грань
                return worldUp.z > 0 ? 6 : 1;
            }
            return 1; // fallback
        }
        
        // Создаём физические тела и меши
        for (let i = 0; i < DICE_COUNT; i++) {
            const geometry = new THREE.BoxGeometry(DICE_SIZE, DICE_SIZE, DICE_SIZE);
            const mesh = new THREE.Mesh(geometry, faceMaterials);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            const shape = new CANNON.Box(new CANNON.Vec3(DICE_SIZE/2, DICE_SIZE/2, DICE_SIZE/2));
            const body = new CANNON.Body({
                mass: 1.0,
                material: diceMat,
                shape: shape,
                linearDamping: 0.1,
                angularDamping: 0.05,
            });
            // Начальная позиция за пределами стола
            body.position.set(0, -15, 0);
            world.addBody(body);
            
            diceMeshes.push(mesh);
            diceBodies.push(body);
        }
        
        // --- БРОСОК СПРАВА НАЛЕВО СВЕРХУ ВНИЗ ---
        let currentCharge = 0;
        let isCharging = false;
        let isRolling = false;
        let stopInterval = null;
        
        const btn = document.getElementById('roll-btn');
        const powerBar = document.getElementById('power-bar');
        const meterDiv = document.getElementById('meter');
        const resultDiv = document.getElementById('res');
        
        const performRoll = (chargePercent) => {
            if (isRolling) return;
            
            // Сила броска: от 0.45 до 1.9 (нормальный диапазон, без "лунной" физики)
            let power = 0.45 + (chargePercent / 100) * 1.45;
            power = Math.min(1.9, Math.max(0.45, power));
            
            isRolling = true;
            
            // Бросаем из правой части стола, высоко, с траекторией влево и вниз
            diceBodies.forEach((body, idx) => {
                // Сброс скоростей
                body.velocity.set(0, 0, 0);
                body.angularVelocity.set(0, 0, 0);
                
                // Стартовая позиция: справа (X = от 16 до 22), с подъёмом по Y (сверху)
                const startX = 18 + Math.random() * 4;
                const startZ = -7 + idx * 3.2 + (Math.random() - 0.5) * 2;
                const startY = 7 + Math.random() * 2.5;  // бросок сверху
                
                body.position.set(startX, startY, startZ);
                
                // Вектор скорости: сильно влево (отрицательный X), слегка вниз и с доворотом по Z
                let velX = -14 * power - Math.random() * 5;
                let velY = -3.5 * power + Math.random() * 4;   // лёгкое downward движение
                let velZ = (Math.random() - 0.5) * 9;
                
                // Ограничиваем, чтобы не вылетало за пределы физики (борта высокие, но скорость адекватная)
                velX = Math.max(-22, Math.min(-8, velX));
                velY = Math.min(2, Math.max(-9, velY));
                velZ = Math.min(10, Math.max(-10, velZ));
                
                body.velocity.set(velX, velY, velZ);
                
                // Вращение: активное, чтобы кубики крутились в воздухе
                const spinAmount = 14 * power + Math.random() * 12;
                body.angularVelocity.set(
                    (Math.random() - 0.5) * spinAmount,
                    (Math.random() - 0.5) * spinAmount,
                    (Math.random() - 0.5) * spinAmount
                );
            });
            
            const powerLevel = power > 1.4 ? "МОЩНЫЙ БРОСОК!" : (power > 0.9 ? "СИЛЬНЫЙ БРОСОК" : "ЛЁГКИЙ БРОСОК");
            resultDiv.innerHTML = `🎯 ${powerLevel} 🎯`;
            
            // Мониторинг остановки
            if (stopInterval) clearInterval(stopInterval);
            stopInterval = setInterval(() => {
                let anyMovement = false;
                for (let b of diceBodies) {
                    const velMag = b.velocity.length();
                    const angMag = b.angularVelocity.length();
                    if (velMag > 0.35 || angMag > 0.4) {
                        anyMovement = true;
                        break;
                    }
                }
                if (!anyMovement && isRolling) {
                    clearInterval(stopInterval);
                    stopInterval = null;
                    isRolling = false;
                    
                    // Определяем результаты для каждого кубика
                    const results = [];
                    for (let i = 0; i < diceBodies.length; i++) {
                        const val = getDiceValue(diceBodies[i]);
                        results.push(val);
                    }
                    const total = results.reduce((s, v) => s + v, 0);
                    resultDiv.innerHTML = `🎲 ${results.join(' · ')}  |  СУММА: ${total} 🎲`;
                    
                    if (navigator.vibrate) navigator.vibrate(80);
                }
            }, 130);
        };
        
        // Зарядка
        const startCharge = (e) => {
            if (isRolling) {
                resultDiv.innerHTML = "⏳ Подожди, кубики ещё крутятся... ⏳";
                return;
            }
            e.preventDefault();
            isCharging = true;
            currentCharge = 0;
            powerBar.style.width = '0%';
            meterDiv.style.display = 'block';
            resultDiv.innerHTML = "💪 ЗАЖИМАЙ! СИЛА БРОСКА РАСТЁТ 💪";
        };
        
        const releaseCharge = (e) => {
            if (!isCharging) return;
            isCharging = false;
            meterDiv.style.display = 'none';
            let finalCharge = Math.min(100, currentCharge);
            if (finalCharge < 8) finalCharge = 8; // минимальный комфортный бросок
            performRoll(finalCharge);
            currentCharge = 0;
        };
        
        btn.addEventListener('mousedown', startCharge);
        window.addEventListener('mouseup', releaseCharge);
        btn.addEventListener('touchstart', startCharge, { passive: false });
        window.addEventListener('touchend', releaseCharge);
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // Цикл заряда
        function chargingUpdate() {
            if (isCharging && currentCharge < 100) {
                currentCharge += 2.2;
                if (currentCharge > 100) currentCharge = 100;
                powerBar.style.width = currentCharge + '%';
            }
            requestAnimationFrame(chargingUpdate);
        }
        chargingUpdate();
        
        // --- КАМЕРА: Комфортный обзор всего стола ---
        function setupCamera() {
            const isMobile = window.innerWidth < 700;
            const distance = isMobile ? 38 : 44;
            camera.position.set(0, 16, distance);
            camera.lookAt(0, 1.5, 0);
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            setupCamera();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        setupCamera();
        
        // --- Декоративные частицы (атмосфера) ---
        const particleCount = 700;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 70;
            particlePositions[i*3+1] = Math.random() * 4 - 0.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 66;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.07, transparent: true, opacity: 0.35 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // --- АНИМАЦИОННЫЙ ЦИКЛ ---
        let lastTimestamp = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(1/30, (now - lastTimestamp) / 1000);
            lastTimestamp = now;
            
            // Шаг физики (60fps стабильно)
            world.step(1 / 60, delta, 3);
            
            // Синхронизация мешей
            for (let i = 0; i < DICE_COUNT; i++) {
                diceMeshes[i].position.copy(diceBodies[i].position);
                diceMeshes[i].quaternion.copy(diceBodies[i].quaternion);
            }
            
            // Плавная анимация частиц
            particles.rotation.y += 0.0018;
            particles.rotation.x = Math.sin(Date.now() * 0.0005) * 0.04;
            
            // Динамическое освещение
            const time = Date.now() * 0.002;
            rimLight.intensity = 0.6 + Math.sin(time) * 0.1;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Изначальная расстановка кубиков на столе (в ожидании броска)
        setTimeout(() => {
            if (!isRolling && diceBodies[0].position.y < -5) {
                const initPositions = [
                    [-8, 0.8, -5], [-3, 0.8, -6], [2, 0.8, -7], [-5, 0.8, 0], [0, 0.8, -1]
                ];
                diceBodies.forEach((body, idx) => {
                    if (initPositions[idx]) {
                        body.position.set(initPositions[idx][0], initPositions[idx][1], initPositions[idx][2]);
                        body.velocity.set(0,0,0);
                        body.angularVelocity.set(0,0,0);
                    }
                });
            }
        }, 150);
    </script>
</body>
</html>
