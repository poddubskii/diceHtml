<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Dice Game | 3 Броска</title>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #05070a; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        #ui-top {
            position: fixed; top: 20px; left: 0; width: 100%; text-align: center;
            color: #fff; z-index: 200; pointer-events: none;
        }
        .stats { font-size: 14px; opacity: 0.7; letter-spacing: 1px; }
        .result { font-size: 28px; font-weight: 900; margin-top: 5px; text-transform: uppercase; }
        
        #ui-bottom {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 150; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 12px;
        }
        
        .btn-group { display: flex; gap: 10px; }
        
        button {
            flex: 1; padding: 18px; font-size: 18px; font-weight: bold;
            cursor: pointer; border-radius: 12px; border: none;
            transition: all 0.2s; background: #ffffff; color: #000;
        }
        
        button:disabled { background: #333; color: #777; cursor: not-allowed; }
        button#reset-btn { background: rgba(255,255,255,0.1); color: #fff; flex: 0.4; }
        
        #info-toast {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px;
            color: #aaa; font-size: 12px; backdrop-filter: blur(5px);
        }

        .hold-badge { color: #4facfe; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="stats">БРОСКОВ ОСТАЛОСЬ: <span id="rolls-count">3</span> / 3</div>
        <div id="res-text" class="result">Нажмите "Бросить"</div>
    </div>

    <div id="info-toast">Нажми на кубик, чтобы <span class="hold-badge">ОСТАВИТЬ</span> его</div>

    <div id="ui-bottom">
        <div class="btn-group">
            <button id="roll-btn">БРОСИТЬ КОСТИ</button>
            <button id="reset-btn">СБРОС</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- НАСТРОЙКИ ---
        let rollsLeft = 3;
        const DICE_COUNT = 5;
        const DICE_SIZE = 2;
        const diceObjects = []; // Массив для хранения связки Mesh + Body + State

        // --- СЦЕНА И ФИЗИКА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05070a);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -20, 0);
        world.allowSleep = true;

        // Свет
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // Пол
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0c });
        const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), floorMat);
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        const floorBody = new CANNON.Body({ mass: 0 });
        floorBody.addShape(new CANNON.Plane());
        floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(floorBody);

        // --- СОЗДАНИЕ КУБИКОВ ---
        function createDiceTexture(num) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff'; ctx.fillRect(0,0,128,128);
            ctx.fillStyle = '#000';
            const dots = {
                1: [[64, 64]], 2: [[32, 32], [96, 96]], 3: [[32, 32], [64, 64], [96, 96]],
                4: [[32, 32], [96, 32], [32, 96], [96, 96]],
                5: [[32, 32], [96, 32], [64, 64], [32, 96], [96, 96]],
                6: [[32, 32], [96, 32], [32, 64], [96, 64], [32, 96], [96, 96]]
            };
            dots[num].forEach(p => { ctx.beginPath(); ctx.arc(p[0], p[1], 12, 0, Math.PI*2); ctx.fill(); });
            return new THREE.CanvasTexture(canvas);
        }

        const diceMaterials = [1,2,3,4,5,6].map(n => new THREE.MeshStandardMaterial({ map: createDiceTexture(n) }));
        // Порядок граней для корректного счета: X+, X-, Y+, Y-, Z+, Z-
        // Стандарт: 3-4, 2-5, 1-6
        const boxMats = [diceMaterials[2], diceMaterials[3], diceMaterials[1], diceMaterials[4], diceMaterials[0], diceMaterials[5]];

        for (let i = 0; i < DICE_COUNT; i++) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(DICE_SIZE, DICE_SIZE, DICE_SIZE), boxMats.map(m => m.clone()));
            mesh.castShadow = true;
            scene.add(mesh);

            const body = new CANNON.Body({
                mass: 1,
                shape: new CANNON.Box(new CANNON.Vec3(DICE_SIZE/2, DICE_SIZE/2, DICE_SIZE/2)),
                sleepTimeLimit: 0.1
            });
            world.addBody(body);

            diceObjects.push({ mesh, body, isHeld: false, value: 0 });
        }

        // --- ЛОГИКА ВЫБОРА (RAYCASTING) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onTouch(event) {
            if (isRolling) return;
            const x = event.touches ? event.touches[0].clientX : event.clientX;
            const y = event.touches ? event.touches[0].clientY : event.clientY;
            
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(diceObjects.map(d => d.mesh));

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                const dice = diceObjects.find(d => d.mesh === clickedMesh);
                toggleHold(dice);
            }
        }

        function toggleHold(dice) {
            dice.isHeld = !dice.isHeld;
            
            if (dice.isHeld) {
                // Подсвечиваем и "замораживаем"
                dice.mesh.children.forEach(c => c.visible = true); // можно добавить рамку
                dice.mesh.material.forEach(m => m.emissive.setHex(0x4facfe));
                dice.mesh.material.forEach(m => m.emissiveIntensity = 0.3);
                
                // Перемещаем в зону "Hold" (верхняя часть экрана)
                dice.body.type = CANNON.Body.STATIC;
                const targetX = -12 + diceObjects.indexOf(dice) * 6;
                dice.body.position.set(targetX, 2, -12); 
                dice.body.quaternion.set(0,0,0,1); // выравниваем для красоты
            } else {
                // Возвращаем в игру
                dice.mesh.material.forEach(m => m.emissive.setHex(0x000000));
                dice.body.type = CANNON.Body.DYNAMIC;
                dice.body.wakeUp();
            }
            calculateTotal();
        }

        // --- ЛОГИКА ИГРЫ ---
        let isRolling = false;
        const rollBtn = document.getElementById('roll-btn');
        const resetBtn = document.getElementById('reset-btn');
        const resText = document.getElementById('res-text');
        const rollsDisplay = document.getElementById('rolls-count');

        function roll() {
            if (rollsLeft <= 0 || isRolling) return;

            isRolling = true;
            rollsLeft--;
            rollsDisplay.innerText = rollsLeft;
            rollBtn.disabled = true;

            diceObjects.forEach((dice, i) => {
                if (!dice.isHeld) {
                    dice.body.type = CANNON.Body.DYNAMIC;
                    dice.body.wakeUp();
                    
                    // Позиция "сверху"
                    dice.body.position.set(0, 15 + i, 0);
                    
                    // Разбрасываем
                    const force = 15 + Math.random() * 15;
                    dice.body.velocity.set((Math.random()-0.5)*force, -10, (Math.random()-0.5)*force);
                    dice.body.angularVelocity.set(Math.random()*20, Math.random()*20, Math.random()*20);
                }
            });

            setTimeout(checkAllStopped, 1000);
        }

        function checkAllStopped() {
            const check = setInterval(() => {
                const stillMoving = diceObjects.some(d => !d.isHeld && d.body.sleepState !== CANNON.Body.SLEEPING && d.body.velocity.length() > 0.2);
                
                if (!stillMoving) {
                    clearInterval(check);
                    isRolling = false;
                    if (rollsLeft > 0) rollBtn.disabled = false;
                    calculateTotal();
                }
            }, 200);
        }

        function calculateTotal() {
            let total = 0;
            const values = diceObjects.map(d => {
                const val = getDiceValue(d.body);
                total += val;
                return val;
            });
            resText.innerHTML = `СУММА: <span style="color:#4facfe">${total}</span>`;
        }

        function getDiceValue(body) {
            const directions = [
                { v: new THREE.Vector3(1, 0, 0), val: 3 }, { v: new THREE.Vector3(-1, 0, 0), val: 4 },
                { v: new THREE.Vector3(0, 1, 0), val: 2 }, { v: new THREE.Vector3(0, -1, 0), val: 5 },
                { v: new THREE.Vector3(0, 0, 1), val: 1 }, { v: new THREE.Vector3(0, 0, -1), val: 6 }
            ];
            const quat = new THREE.Quaternion(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
            let maxUp = -1, value = 1;
            directions.forEach(d => {
                const worldV = d.v.clone().applyQuaternion(quat);
                if (worldV.y > maxUp) { maxUp = worldV.y; value = d.val; }
            });
            return value;
        }

        function resetGame() {
            rollsLeft = 3;
            rollsDisplay.innerText = rollsLeft;
            rollBtn.disabled = false;
            resText.innerText = "Нажмите 'Бросить'";
            
            diceObjects.forEach((dice, i) => {
                dice.isHeld = false;
                dice.mesh.material.forEach(m => m.emissive.setHex(0x000000));
                dice.body.type = CANNON.Body.DYNAMIC;
                dice.body.position.set(i*3 - 6, 2, 0);
                dice.body.quaternion.set(0,0,0,1);
                dice.body.velocity.set(0,0,0);
                dice.body.angularVelocity.set(0,0,0);
                dice.body.wakeUp();
            });
        }

        // --- СОБЫТИЯ ---
        window.addEventListener('mousedown', onTouch);
        rollBtn.addEventListener('click', roll);
        resetBtn.addEventListener('click', resetGame);

        // --- ЦИКЛ АНИМАЦИИ ---
        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();
            diceObjects.forEach(d => {
                d.mesh.position.copy(d.body.position);
                d.mesh.quaternion.copy(d.body.quaternion);
            });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
