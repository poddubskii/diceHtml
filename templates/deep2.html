<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Dice: Реалистичные кубики | Настоящая физика</title>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0c12;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
            touch-action: pan-x pan-y;
        }
        #res {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ffd966;
            font-size: 24px;
            font-weight: 800;
            z-index: 200;
            text-shadow: 2px 2px 6px #000000cc;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            padding: 10px 0;
            letter-spacing: 1px;
            font-family: monospace;
            pointer-events: none;
        }
        #ui {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            width: 85%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .meter-container {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            border: 1px solid rgba(255,200,100,0.7);
            overflow: hidden;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            display: none;
        }
        #power-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f39c12, #e67e22);
            border-radius: 20px;
            transition: width 0.02s linear;
        }
        button {
            width: 100%;
            padding: 16px 20px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            background: #e67e22;
            color: white;
            box-shadow: 0 6px 0 #b45f1b;
            transition: 0.05s linear;
            font-family: inherit;
            letter-spacing: 2px;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b45f1b;
        }
        #info {
            position: fixed;
            bottom: 110px;
            left: 0;
            right: 0;
            text-align: center;
            color: #aaa;
            font-size: 11px;
            background: rgba(0,0,0,0.5);
            width: fit-content;
            margin: 0 auto;
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            button { padding: 14px; font-size: 20px; }
            #res { font-size: 18px; top: 12px; }
            #info { bottom: 125px; }
        }
    </style>
</head>
<body>
    <div id="res">🎲 ЗАЖМИ КНОПКУ — СИЛА БРОСКА 🎲</div>
    <div id="ui">
        <div class="meter-container" id="meter">
            <div id="power-bar"></div>
        </div>
        <button id="roll-btn">🎯 БРОСИТЬ 🎯</button>
    </div>
    <div id="info">💡 Держи дольше → сильнее бросок. Кубики не улетают за пределы стола!</div>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- СЦЕНА THREE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0c12);
        scene.fog = new THREE.FogExp2(0x0a0c12, 0.012);
        
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // --- ОСВЕЩЕНИЕ ---
        const ambient = new THREE.AmbientLight(0x3a4055, 0.65);
        scene.add(ambient);
        
        const mainLight = new THREE.DirectionalLight(0xfff2e0, 1.1);
        mainLight.position.set(10, 22, 12);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 35;
        mainLight.shadow.camera.left = -12;
        mainLight.shadow.camera.right = 12;
        mainLight.shadow.camera.top = 12;
        mainLight.shadow.camera.bottom = -12;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0xccaa77, 0.45);
        fillLight.position.set(-4, 10, -8);
        scene.add(fillLight);
        
        const backRim = new THREE.PointLight(0x6688aa, 0.5);
        backRim.position.set(5, 8, -12);
        scene.add(backRim);
        
        const groundFill = new THREE.PointLight(0x5a7a5a, 0.3);
        groundFill.position.set(0, -2, 0);
        scene.add(groundFill);
        
        // Декоративная сетка
        const grid = new THREE.GridHelper(70, 20, 0x88aaff, 0x446688);
        grid.position.y = -0.08;
        grid.material.transparent = true;
        grid.material.opacity = 0.3;
        scene.add(grid);
        
        // --- ФИЗИЧЕСКИЙ МИР (РЕАЛИСТИЧНАЯ ЗЕМНАЯ ГРАВИТАЦИЯ) ---
        const world = new CANNON.World();
        world.gravity = new CANNON.Vec3(0, -12.0, 0);  // ~ земная гравитация, но чуть выше для отзывчивости
        world.broadphase = new CANNON.NaiveBroadphase();
        world.defaultContactMaterial.restitution = 0.45;
        
        // Материалы
        const diceMat = new CANNON.Material('dice');
        const floorMat = new CANNON.Material('floor');
        const wallMat = new CANNON.Material('wall');
        
        // Контакт кубик-пол: достаточное трение, чтобы кубики тормозили, но не прилипали
        const diceFloorContact = new CANNON.ContactMaterial(diceMat, floorMat, {
            friction: 0.5,
            restitution: 0.52,
            contactEquationStiffness: 1e8,
        });
        world.addContactMaterial(diceFloorContact);
        
        const diceWallContact = new CANNON.ContactMaterial(diceMat, wallMat, {
            friction: 0.35,
            restitution: 0.48,
        });
        world.addContactMaterial(diceWallContact);
        
        world.defaultContactMaterial.material1 = diceMat;
        world.defaultContactMaterial.material2 = floorMat;
        
        // ---- ПОЛ (физическая платформа) ----
        // Увеличим размеры, чтобы кубики не вылетали, но стены ограничат
        const floorBody = new CANNON.Body({
            mass: 0,
            material: floorMat,
            shape: new CANNON.Box(new CANNON.Vec3(28, 0.4, 28)),
        });
        floorBody.position.set(0, -1.0, 0);
        world.addBody(floorBody);
        
        // Визуальное покрытие стола (сукно)
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x1e4d2e, roughness: 0.7, metalness: 0.05, side: THREE.DoubleSide });
        const visualFloor = new THREE.Mesh(new THREE.PlaneGeometry(56, 56), tableMat);
        visualFloor.rotation.x = -Math.PI / 2;
        visualFloor.position.y = -0.95;
        visualFloor.receiveShadow = true;
        scene.add(visualFloor);
        
        // Круглая декоративная зона
        const decalRing = new THREE.Mesh(
            new THREE.RingGeometry(9, 24, 32),
            new THREE.MeshStandardMaterial({ color: 0xaa8c54, roughness: 0.5, metalness: 0.3, side: THREE.DoubleSide })
        );
        decalRing.rotation.x = -Math.PI / 2;
        decalRing.position.y = -0.92;
        decalRing.receiveShadow = true;
        scene.add(decalRing);
        
        // ---- СТЕНЫ (БОРТИКИ) НИЗКИЕ, НО ЭФФЕКТИВНЫЕ, ЧТОБЫ КУБИКИ НЕ УЛЕТАЛИ ---
        const wallHeight = 1.6;
        const wallThick = 0.8;
        const arenaHalf = 26;
        
        const addWallWithMesh = (x, z, sx, sz, rotY = 0) => {
            const wallBody = new CANNON.Body({
                mass: 0,
                material: wallMat,
                shape: new CANNON.Box(new CANNON.Vec3(sx/2, wallHeight/2, sz/2)),
            });
            wallBody.position.set(x, wallHeight/2, z);
            world.addBody(wallBody);
            
            const wallMesh = new THREE.Mesh(
                new THREE.BoxGeometry(sx, wallHeight, sz),
                new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.5, metalness: 0.1 })
            );
            wallMesh.position.set(x, wallHeight/2, z);
            wallMesh.castShadow = true;
            wallMesh.receiveShadow = true;
            scene.add(wallMesh);
        };
        
        // Границы (не слишком широкие, чтобы кубики оставались в зоне видимости)
        addWallWithMesh(-arenaHalf, 0, wallThick, arenaHalf*2 + 2);
        addWallWithMesh(arenaHalf, 0, wallThick, arenaHalf*2 + 2);
        addWallWithMesh(0, -arenaHalf, arenaHalf*2 + 2, wallThick);
        addWallWithMesh(0, arenaHalf, arenaHalf*2 + 2, wallThick);
        
        // небольшие угловые украшения
        const cornerDecoMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c });
        const corners = [[-25, -25], [25, -25], [-25, 25], [25, 25]];
        corners.forEach(([x, z]) => {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.9), cornerDecoMat);
            pillar.position.set(x, -0.3, z);
            pillar.castShadow = true;
            scene.add(pillar);
        });
        
        // --- СОЗДАНИЕ КУБИКОВ (5 штук, отличная детализация)---
        const diceMeshes = [];
        const diceBodies = [];
        const DICE_COUNT = 5;
        const DICE_SIZE = 2.15;
        
        // Генерация текстур с четкими точками
        const createDiceTexture = (number, bgColor = '#fff8ed', dotColor = '#1e2a3a') => {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // лёгкое тиснение по краю
            ctx.strokeStyle = '#cbb886';
            ctx.lineWidth = 14;
            ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
            
            ctx.fillStyle = dotColor;
            const cx = canvas.width/2, cy = canvas.height/2;
            const r = canvas.width * 0.09;
            const off = canvas.width * 0.27;
            
            const drawDot = (x, y) => {
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI*2);
                ctx.fill();
                // блик
                ctx.fillStyle = '#4a5568';
                ctx.beginPath();
                ctx.arc(x - 4, y - 4, r*0.25, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = dotColor;
            };
            
            // стандартная разметка игральных костей
            if (number === 1 || number === 3 || number === 5) drawDot(cx, cy);
            if (number === 2 || number === 3 || number === 4 || number === 5 || number === 6) {
                drawDot(cx - off, cy - off);
                drawDot(cx + off, cy + off);
            }
            if (number === 4 || number === 5 || number === 6) {
                drawDot(cx - off, cy + off);
                drawDot(cx + off, cy - off);
            }
            if (number === 6) {
                drawDot(cx - off, cy);
                drawDot(cx + off, cy);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return new THREE.MeshStandardMaterial({ map: texture, roughness: 0.25, metalness: 0.05 });
        };
        
        const materials = [1,2,3,4,5,6].map(n => createDiceTexture(n));
        
        // Определение выпавшего числа по нормали (более точное)
        function getDiceValue(body) {
            const quat = body.quaternion;
            const localUp = new CANNON.Vec3(0, 1, 0);
            const worldUp = quat.vmult(localUp);
            const absX = Math.abs(worldUp.x);
            const absY = Math.abs(worldUp.y);
            const absZ = Math.abs(worldUp.z);
            
            if (absY > absX && absY > absZ) return worldUp.y > 0 ? 5 : 2;
            if (absX > absY && absX > absZ) return worldUp.x > 0 ? 4 : 3;
            if (absZ > absY && absZ > absX) return worldUp.z > 0 ? 6 : 1;
            return 1;
        }
        
        for (let i = 0; i < DICE_COUNT; i++) {
            const geometry = new THREE.BoxGeometry(DICE_SIZE, DICE_SIZE, DICE_SIZE);
            const mesh = new THREE.Mesh(geometry, materials);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            const shape = new CANNON.Box(new CANNON.Vec3(DICE_SIZE/2, DICE_SIZE/2, DICE_SIZE/2));
            const body = new CANNON.Body({
                mass: 1.0,
                material: diceMat,
                shape: shape,
                linearDamping: 0.12,
                angularDamping: 0.06,
            });
            // стартовая позиция в стороне (до первого броска)
            body.position.set(0, -10, 0);
            world.addBody(body);
            
            diceMeshes.push(mesh);
            diceBodies.push(body);
        }
        
        // --- ЛОГИКА БРОСКА (РЕАЛИСТИЧНЫЕ ИМПУЛЬСЫ)---
        let currentCharge = 0;
        let isCharging = false;
        let isRolling = false;
        let stopCheckInterval = null;
        
        const btn = document.getElementById('roll-btn');
        const powerBar = document.getElementById('power-bar');
        const meterDiv = document.getElementById('meter');
        const resultDiv = document.getElementById('res');
        
        // Функция броска: сила от 0 (минимум) до 1 (максимум заряда)
        const rollDice = (chargePercent) => {
            if (isRolling) return;
            
            // Преобразуем заряд 0-100 в множитель силы (min 0.38, max 1.75)
            // но без космических скоростей: земная физика
            let power = 0.38 + (chargePercent / 100) * 1.37;
            power = Math.min(1.78, Math.max(0.4, power));
            
            isRolling = true;
            
            // Кубики вылетают из правой части стола, но с адекватной траекторией, не улетая за борта
            diceBodies.forEach((body, idx) => {
                // сброс скоростей
                body.velocity.set(0, 0, 0);
                body.angularVelocity.set(0, 0, 0);
                
                // Начальная позиция — зона броска (справа, ближе к краю)
                const startX = 50;
                const startZ = -6 + idx * 3.2; // разброс по Z
                const startY = 50.2 + Math.random() * 1.0;
                body.position.set(startX + (Math.random() - 0.5) * 1.8, startY, startZ + (Math.random() - 0.5) * 1.5);
                
                // Импульс: направление влево и чуть вперед/назад, адекватная сила
                // Базовый вектор: сильно влево и немного вглубь стола
                let velX = -2.5 * power - Math.random() * 4;
                let velZ = (Math.random() - 0.5) * 10.5;
                let velY = -0.2  + Math.random() * -3.2;
                
                // Ограничим скорость, чтобы не вылетали за стены физически (макс ~20 по X)
                velX = Math.max(-11, Math.min(-5, velX));
                velZ = Math.min(18, Math.max(-8, velZ));
                velY = Math.min(11, Math.max(4.5, velY));
                
                body.velocity.set(velX, velY, velZ);
                
                // Вращение: умеренное, но хаотичное (без диких значений)
                const spin = 20 * power + Math.random() * 1;
                body.angularVelocity.set(
                    (Math.random() - 0.5) * spin/100,
                    (Math.random() - 0.5) * spin,
                    (Math.random() - 0.5) * spin
                );
            });
            
            const powerText = power > 1.3 ? "МОЩНЫЙ БРОСОК!" : (power > 0.8 ? "СРЕДНЯЯ СИЛА" : "ЛЁГКИЙ БРОСОК");
            resultDiv.innerHTML = `🎲 ${powerText} 🎲`;
            
            // Очистить предыдущий интервал проверки
            if (stopCheckInterval) clearInterval(stopCheckInterval);
            
            // Проверка остановки кубиков каждые 150мс
            stopCheckInterval = setInterval(() => {
                let moving = false;
                for (let b of diceBodies) {
                    const vmag = b.velocity.length();
                    const avmag = b.angularVelocity.length();
                    if (vmag > 0.28 || avmag > 0.35) {
                        moving = true;
                        break;
                    }
                }
                if (!moving && isRolling) {
                    clearInterval(stopCheckInterval);
                    stopCheckInterval = null;
                    isRolling = false;
                    
                    // Подсчёт результатов
                    const values = [];
                    for (let i = 0; i < diceBodies.length; i++) {
                        const val = getDiceValue(diceBodies[i]);
                        values.push(val);
                    }
                    const total = values.reduce((s, v) => s + v, 0);
                    resultDiv.innerHTML = `🎲 ${values.join(' · ')}  |  СУММА: ${total} 🎲`;
                    
                    // лёгкая вибрация на мобильных
                    if (navigator.vibrate) navigator.vibrate(80);
                }
            }, 150);
        };
        
        // Заряд силы
        const startCharge = (e) => {
            if (isRolling) {
                resultDiv.innerHTML = "⏳ Кубики крутятся, подожди... ⏳";
                return;
            }
            e.preventDefault();
            isCharging = true;
            currentCharge = 0;
            powerBar.style.width = '0%';
            meterDiv.style.display = 'block';
            resultDiv.innerHTML = "💪 ЗАЖИМАЙ, КОПИ СИЛУ! 💪";
        };
        
        const releaseCharge = (e) => {
            if (!isCharging) return;
            isCharging = false;
            meterDiv.style.display = 'none';
            let finalCharge = Math.min(100, currentCharge);
            if (finalCharge < 6) finalCharge = 6; // минимальный толчок, чтобы кубики вылетели из руки
            rollDice(finalCharge);
            currentCharge = 0;
        };
        
        btn.addEventListener('mousedown', startCharge);
        window.addEventListener('mouseup', releaseCharge);
        btn.addEventListener('touchstart', startCharge, { passive: false });
        window.addEventListener('touchend', releaseCharge);
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // Анимация заряда
        function chargeLoop() {
            if (isCharging && currentCharge < 100) {
                currentCharge += 2.2;
                if (currentCharge > 100) currentCharge = 100;
                powerBar.style.width = currentCharge + '%';
            }
            requestAnimationFrame(chargeLoop);
        }
        chargeLoop();
        
        // --- КАМЕРА: статичная, но комфортный обзор всей арены ---
        function setCameraView() {
            const isMobile = window.innerWidth < 700;
            const dist = isMobile ? 36 : 42;
            camera.position.set(0, 14, dist);
            camera.lookAt(0, 1.2, 0);
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            setCameraView();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        setCameraView();
        
        // --- Декоративные частицы (лёгкая атмосфера) ---
        const particleGeo = new THREE.BufferGeometry();
        const particleCount = 600;
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 62;
            positions[i*3+1] = Math.random() * 3.5 - 0.5;
            positions[i*3+2] = (Math.random() - 0.5) * 58;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMatGlow = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.07, transparent: true, opacity: 0.35 });
        const particlesSys = new THREE.Points(particleGeo, particleMatGlow);
        scene.add(particlesSys);
        
        // --- АНИМАЦИОННЫЙ ЦИКЛ ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(1/30, (now - lastTime) / 5000);
            lastTime = now;
            
            // Шаг физики с фиксированным временем
            world.step(1 / 60, delta, 3);
            
            // Синхронизация графики и физики
            for (let i = 0; i < DICE_COUNT; i++) {
                diceMeshes[i].position.copy(diceBodies[i].position);
                diceMeshes[i].quaternion.copy(diceBodies[i].quaternion);
            }
            
            // плавное вращение частиц
            particlesSys.rotation.y += 0.0005;
            particlesSys.rotation.x = Math.sin(Date.now() * 0.0004) * 0.01;
            
            // Динамический свет для живости
            const t = Date.now() * 0.0015;
            backRim.intensity = 0.55 + Math.sin(t) * 0.08;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Разместить кубики красиво перед первым броском, но не запускать автоматический бросок
        setTimeout(() => {
            if (!isRolling && diceBodies[0].position.y < -2) {
                // расставим кубики в зоне ожидания, красиво на столе
                const startPositions = [
                    [-6, 0.5, -5], [-1, 0.5, -6], [4, 0.5, -7], [-3, 0.5, -1], [2, 0.5, -2]
                ];
                diceBodies.forEach((body, idx) => {
                    if (startPositions[idx]) {
                        body.position.set(startPositions[idx][0], startPositions[idx][1], startPositions[idx][2]);
                        body.velocity.set(0,0,0);
                        body.angularVelocity.set(0,0,0);
                    }
                });
            }
        }, 100);
    </script>
</body>
</html>
