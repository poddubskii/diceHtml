<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Poker Dice - Movable Table</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
    <style>
        :root { --p-bg: #122100; --ai-bg: #ffffff; --accent: #4facfe; }
        body { margin: 0; overflow: hidden; background: #004d00; font-family: sans-serif; user-select: none; touch-action: none; }
        
        /* Прозрачная шапка сайта */
        #site-header { 
            position: fixed; top: 0; width: 100%; z-index: 10;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px);
            color: white; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .score-line { display: flex; justify-content: space-around; padding: 8px 0; font-size: 18px; font-weight: 900; }

        /* ПЛАВАЮЩАЯ ТАБЛИЦА */
        #window-container { 
            position: absolute; top: 70px; left: 2vw; z-index: 100; 
            pointer-events: auto; touch-action: none;
        }
        
        #game-table { 
            width: 96vw; max-width: 480px; background: #add8e6; display: grid; 
            grid-template-columns: 35px repeat(4, 1fr) repeat(4, 1fr); 
            border: 2px solid #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Заголовок-ручка для перетаскивания */
        .drag-handle { cursor: move; border-bottom: 2px solid #000 !important; }

        .cell { border: 0.5px solid rgba(0,0,0,0.2); height: 22px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; position: relative; }
        .row-label { background: #c0c0c0; color: #333; justify-content: flex-start; padding-left: 3px; }
        
        .p-col { background: var(--p-bg); color: var(--accent); }
        .a-col { background: var(--ai-bg); color: #000; }

        /* Выделение бонусов */
        .row_bonus_head { background-color: rgba(255, 215, 0, 0.4) !important; }
        .row_bonus { background-color: rgba(0, 255, 127, 0.3) !important; }
        .col_bonus { background-color: rgba(0, 0, 0, 0.15) !important; border-left: 1px solid gold !important; }

        /* Рука */
        .hand { position: absolute; top: -20px; font-size: 18px; display: none; }
        .active-turn .hand { display: block; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* Кнопка управления */
        #controls { position: fixed; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #roll-btn { width: 80px; height: 80px; border-radius: 50%; background: #ff4141; border: 4px solid #fff; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="site-header">
    <div class="score-line">
        <span>🪐 <span id="p-score">0</span></span>
        <span>Swan <span id="a-score">0</span></span>
    </div>
</div>

<div id="window-container">
    <div id="game-table">
        <div class="cell row-label">№</div>
        <div class="cell p-col active-turn drag-handle" style="grid-column: span 4" id="p-header">
            <span class="hand">👆</span> PLAYER
        </div>
        <div class="cell a-col drag-handle" style="grid-column: span 4" id="a-header">
            <span class="hand">👆</span> AI
        </div>
    </div>
</div>

<div id="controls">
    <div id="hint" style="color:white; font-weight:bold; margin-bottom:5px;">Бросай кубики!</div>
    <button id="roll-btn">ROLL</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'cannon-es';

    const CATEGORIES = [
        {id:'r1', n:'1'}, {id:'r2', n:'2'}, {id:'r3', n:'3'}, {id:'r4', n:'4'}, {id:'r5', n:'5'}, {id:'r6', n:'6'},
        {id:'pair', n:'Para'}, {id:'two', n:'2+2'}, {id:'set', n:'▲'}, {id:'sq', n:'■'},
        {id:'full', n:'Full'}, {id:'lstr', n:'LStr'}, {id:'bstr', n:'BStr'}, {id:'pok', n:'P'}, {id:'ch', n:'$'}
    ];

    let game = { p: [{},{},{},{}], a: [{},{},{},{}], rolls: 3, turn: 'p' };

    // --- СБОРКА ТАБЛИЦЫ ---
    const table = document.getElementById('game-table');
    let rowIndex = 0;

    CATEGORIES.forEach(cat => {
        const lbl = document.createElement('div');
        lbl.className = 'cell row-label'; lbl.innerText = cat.n;
        table.appendChild(lbl);

        const applyStyles = (cell, i) => {
            if (rowIndex === 0) cell.classList.add("row_bonus_head");
            if (rowIndex === 6 || rowIndex === 17) cell.classList.add("row_bonus");
            if (i === 3) cell.classList.add("col_bonus");
        };

        for(let i=0; i<4; i++) {
            const c = document.createElement('div');
            c.className = 'cell p-col'; c.id = `p_${i}_${cat.id}`;
            c.onclick = () => onCellClick(i, cat.id, 'p');
            applyStyles(c, i);
            table.appendChild(c);
        }
        for(let i=0; i<4; i++) {
            const c = document.createElement('div');
            c.className = 'cell a-col'; c.id = `a_${i}_${cat.id}`;
            c.onclick = () => onCellClick(i, cat.id, 'a'); // AI ячейки тоже можно менять вручную
            applyStyles(c, i);
            table.appendChild(c);
        }
        rowIndex++;
    });

    // --- ЛОГИКА ПЕРЕДВИЖЕНИЯ ТАБЛИЦЫ ---
    const win = document.getElementById('window-container');
    const handles = document.querySelectorAll('.drag-handle');
    let isDragging = false, offset = { x: 0, y: 0 };

    const startDrag = (e) => {
        isDragging = true;
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        offset.x = clientX - win.offsetLeft;
        offset.y = clientY - win.offsetTop;
    };

    const doDrag = (e) => {
        if (!isDragging) return;
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        win.style.left = (clientX - offset.x) + 'px';
        win.style.top = (clientY - offset.y) + 'px';
    };

    handles.forEach(h => {
        h.addEventListener('mousedown', startDrag);
        h.addEventListener('touchstart', startDrag);
    });
    window.addEventListener('mousemove', doDrag);
    window.addEventListener('touchmove', doDrag, { passive: false });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchend', () => isDragging = false);

    // --- РУЧНОЕ ИЗМЕНЕНИЕ ---
    function onCellClick(col, catId, side) {
        // Если это ход игрока и ячейка пустая - пишем результат броска
        if (side === 'p' && game.turn === 'p' && game.rolls < 3 && game.p[col][catId] === undefined) {
            writeResult(col, catId);
            return;
        }
        // В любом другом случае - ручное редактирование
        const newVal = prompt("Введите значение (или оставьте пустым для удаления):", "");
        if (newVal !== null) {
            const val = newVal === "" ? undefined : parseInt(newVal);
            game[side][col][catId] = val;
            const el = document.getElementById(`${side}_${col}_${catId}`);
            el.innerText = (val === undefined) ? "" : val;
            updateTotals();
        }
    }

    function writeResult(col, catId) {
        const score = Math.floor(Math.random() * 20); // Здесь должна быть твоя функция calculateScore
        game.p[col][catId] = score;
        document.getElementById(`p_${col}_${catId}`).innerText = score;
        updateTotals();
        game.turn = 'a';
        toggleTurn();
    }

    function updateTotals() {
        const sum = (s) => game[s].reduce((a, c) => a + Object.values(c).reduce((v, b) => v + b, 0), 0);
        document.getElementById('p-score').innerText = sum('p');
        document.getElementById('a-score').innerText = sum('a');
    }

    function toggleTurn() {
        document.getElementById('p-header').classList.toggle('active-turn', game.turn === 'p');
        document.getElementById('a-header').classList.toggle('active-turn', game.turn === 'a');
    }

    // --- 3D МИНИМУМ (для работы ROLL) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 1000);
    camera.position.set(0, 50, 20); camera.lookAt(0,0,0);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    document.getElementById('roll-btn').onclick = () => {
        if (game.rolls > 0) game.rolls--;
        document.getElementById('hint').innerText = `Попыток: ${game.rolls}`;
        if (game.rolls === 0) game.rolls = 3; // Для теста сбрасываем
    };

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    animate();

</script>
</body>
</html>
