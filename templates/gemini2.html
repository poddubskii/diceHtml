<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Dice: Crazy Spin Edition</title>
    <style>
        :root { --dice-size: 50px; }
        body {
            margin: 0; overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            background: #050505; perspective: 1800px; font-family: 'Segoe UI', sans-serif;
        }

        .scene {
            position: relative; width: 1000px; height: 600px;
            transform-style: preserve-3d; transform: rotateX(60deg);
        }
        .felt {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a472a 0%, #051a0d 100%);
            border: 15px solid #3e2723; border-radius: 30px;
            box-shadow: inset 0 0 100px #000;
        }

        .cup-wrapper {
            position: absolute; top: 5%; left: 50%; margin-left: -50px;
            transform-style: preserve-3d; z-index: 100;
        }
        .cup {
            width: 100px; height: 130px; background: #222;
            border: 2px solid #444; border-radius: 0 0 20px 20px;
        }
        .vibrate { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        .dice-wrapper {
            position: absolute; left: 50%; top: 50px;
            width: var(--dice-size); height: var(--dice-size);
            margin-left: -25px; transform-style: preserve-3d;
            opacity: 0; pointer-events: none;
        }
        .dice {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute; width: 50px; height: 50px;
            background: #fff; border: 1px solid #ccc; border-radius: 8px;
            display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 5px; box-sizing: border-box; backface-visibility: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .dot { width: 10px; height: 10px; background: #111; border-radius: 50%; align-self: center; justify-self: center; }

        .f1 { transform: rotateY(0deg) translateZ(25px); }
        .f6 { transform: rotateY(180deg) translateZ(25px); }
        .f2 { transform: rotateX(-90deg) translateZ(25px); }
        .f5 { transform: rotateX(90deg) translateZ(25px); }
        .f3 { transform: rotateY(90deg) translateZ(25px); }
        .f4 { transform: rotateY(-90deg) translateZ(25px); }

        .ui { position: fixed; bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #res-display { color: #f1c40f; font-size: 30px; font-weight: bold; min-height: 40px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .power-bar { width: 300px; height: 15px; background: #222; border-radius: 10px; border: 2px solid #444; overflow: hidden; }
        #power-level { width: 0%; height: 100%; background: linear-gradient(90deg, #27ae60, #f1c40f, #e74c3c); }

        button {
            padding: 20px 60px; background: #c0392b; color: white; border: none;
            border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer;
            box-shadow: 0 6px #962d22; transition: 0.1s; user-select: none;
        }
        button:active { transform: translateY(3px); box-shadow: 0 3px #962d22; }
    </style>
</head>
<body>

    <div id="res-display"></div>

    <div class="cup-wrapper" id="cup-wrap">
        <div class="cup" id="cup-body"></div>
    </div>

    <div class="scene">
        <div class="felt"></div>
        <div id="dice-field" style="transform-style: preserve-3d;"></div>
    </div>

    <div class="ui">
        <div class="power-bar"><div id="power-level"></div></div>
        <button id="throw-btn">ЗАРЯДИТЬ БРОСОК</button>
    </div>

    <script>
        const field = document.getElementById('dice-field');
        const cupWrap = document.getElementById('cup-wrap');
        const cupBody = document.getElementById('cup-body');
        const powerLevel = document.getElementById('power-level');
        const resDisplay = document.getElementById('res-display');
        const btn = document.getElementById('throw-btn');

        let power = 0;
        let pInterval;
        let isRolling = false;

        const dotsMap = {
            1: [5], 2: [1, 9], 3: [1, 5, 9],
            4: [1, 3, 7, 9], 5: [1, 3, 5, 7, 9], 6: [1, 3, 4, 6, 7, 9]
        };

        function createDice() {
            for(let i=0; i<5; i++) {
                const w = document.createElement('div');
                w.className = 'dice-wrapper';
                let facesHTML = '';
                [1,6,2,5,3,4].forEach(v => {
                    let dots = '';
                    for(let d=1; d<=9; d++) {
                        if(dotsMap[v].includes(d)) dots += `<div class="dot"></div>`;
                        else dots += `<div></div>`;
                    }
                    facesHTML += `<div class="face f${v}">${dots}</div>`;
                });
                w.innerHTML = `<div class="dice">${facesHTML}</div>`;
                field.appendChild(w);
            }
        }
        createDice();

        btn.onmousedown = () => {
            if(isRolling) return;
            power = 0;
            resDisplay.innerText = "";
            cupBody.classList.add('vibrate');
            pInterval = setInterval(() => {
                if(power < 100) {
                    power += 2;
                    powerLevel.style.width = power + '%';
                    cupWrap.style.transform = `translateY(${-power/4}px) rotate(${power/20}deg)`;
                }
            }, 25);
        };

        window.onmouseup = () => {
            if(!pInterval) return;
            clearInterval(pInterval);
            pInterval = null;
            cupBody.classList.remove('vibrate');
            startThrow(power);
            powerLevel.style.width = '0%';
        };

        function startThrow(p) {
            isRolling = true;
            cupWrap.style.transition = "transform 0.3s ease-in";
            cupWrap.style.transform = "translateY(-150px) rotateX(-40deg) rotateZ(-100deg)";

            const wraps = document.querySelectorAll('.dice-wrapper');
            const usedPos = [];
            const results = [];

            wraps.forEach((w, i) => {
                const dice = w.querySelector('.dice');

                w.style.transition = 'none';
                dice.style.transition = 'none';
                w.style.opacity = '0';
                w.style.transform = `translate(0,0) translateZ(300px) scale(0.4)`;
                void w.offsetWidth;

                let tx, ty;
                let attempts = 0;
                do {
                    const radius = 120 + (p * 4);
                    tx = (Math.random() - 0.5) * radius;
                    ty = Math.random() * (radius * 0.8) + 120;
                    attempts++;
                } while (usedPos.some(pos => Math.hypot(tx-pos.x, ty-pos.y) < 65) && attempts < 50);

                usedPos.push({x: tx, y: ty});

                setTimeout(() => {
                    // Уменьшаем время для более резкого броска
                    const duration = 0.5 + (p/250);

                    w.style.opacity = '1';
                    w.style.transition = `transform ${duration}s cubic-bezier(0.1, 0.9, 0.3, 1), opacity 0.1s`;

                    // Делаем кривую вращения более агрессивной (быстрый старт, резкий стоп)
                    dice.style.transition = `transform ${duration}s cubic-bezier(0.05, 0, 0.15, 1)`;

                    const rz = (Math.random() - 0.5) * 120; // Больше закрутки самой обертки
                    w.style.transform = `translate(${tx}px, ${ty}px) translateZ(25px) rotateZ(${rz}deg)`;

                    const val = Math.floor(Math.random() * 6) + 1;
                    results.push(val);

                    const rotations = {
                        1: {x: 0, y: 0}, 6: {x: 0, y: 180},
                        2: {x: 90, y: 0}, 5: {x: -90, y: 0},
                        3: {x: 0, y: -90}, 4: {x: 0, y: 90}
                    };
                    const rot = rotations[val];

                    // БЕЗУМНОЕ ВРАЩЕНИЕ: 10 базовых оборотов (3600 град) + до 5 случайных оборотов
                    const extraSpinsX = 3600 + (Math.floor(Math.random() * 6) * 360);
                    const extraSpinsY = 3600 + (Math.floor(Math.random() * 6) * 360);

                    dice.style.transform = `rotateX(${rot.x + extraSpinsX}deg) rotateY(${rot.y + extraSpinsY}deg)`;

                    if(i === wraps.length - 1) {
                        setTimeout(() => {
                            resDisplay.innerText = `Сумма: ${results.reduce((a,b)=>a+b,0)} (${results.join(' + ')})`;
                            isRolling = false;
                            setTimeout(() => {
                                cupWrap.style.transition = "transform 0.5s ease-out";
                                cupWrap.style.transform = "translateY(0) rotate(0)";
                            }, 500);
                        }, duration * 1000);
                    }
                }, i * 40 + 50);
            });
        }
    </script>
</body>
</html>
