<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Dice | Memory Mode</title>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #080a0e; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        /* Верхняя панель */
        #ui-top {
            position: fixed; top: 30px; left: 0; width: 100%; text-align: center;
            color: #fff; z-index: 200; pointer-events: none;
        }
        .stats { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #4facfe; opacity: 0.8; }
        .result-container { display: flex; justify-content: center; align-items: baseline; gap: 15px; margin-top: 5px; }
        .total-score { font-size: 48px; font-weight: 900; text-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
        
        /* Список удержанных значений */
        #held-tray {
            margin-top: 15px; display: flex; justify-content: center; gap: 8px; height: 30px;
        }
        .die-icon {
            background: #4facfe; color: #000; width: 28px; height: 28px; 
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; box-shadow: 0 0 10px rgba(79, 172, 254, 0.5);
        }

        /* Управление */
        #ui-bottom {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 150; width: 85%; max-width: 400px; display: flex; flex-direction: column; gap: 15px;
        }
        .meter-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; display: none; }
        #power-bar { width: 0%; height: 100%; background: #4facfe; }

        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 20px; font-size: 18px; font-weight: 800;
            cursor: pointer; border-radius: 16px; border: none;
            background: #fff; color: #000; text-transform: uppercase;
        }
        button:disabled { opacity: 0.2; }
        #reset-btn { flex: 0.4; background: rgba(255,255,255,0.1); color: #fff; font-size: 12px; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="stats">Попыток: <span id="rolls-count">3</span> / 3</div>
        <div class="result-container">
            <span class="total-score" id="res-text">0</span>
        </div>
        <div id="held-tray"></div>
    </div>

    <div id="ui-bottom">
        <div class="meter-container" id="meter"><div id="power-bar"></div></div>
        <div class="btn-group">
            <button id="roll-btn">Бросок</button>
            <button id="reset-btn">Сброс</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        let rollsLeft = 3;
        const DICE_COUNT = 5;
        const DICE_SIZE = 2;
        const diceObjects = [];
        let isRolling = false, isCharging = false, charge = 0;

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 38, 24);
        camera.lookAt(0, -2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -35, 0);
        world.allowSleep = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 0.7);
        sun.position.set(10, 30, 5);
        sun.castShadow = true;
        scene.add(sun);

        // --- Арена ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshStandardMaterial({ color: 0x0c0e12 }));
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const floorBody = new CANNON.Body({ mass: 0 });
        floorBody.addShape(new CANNON.Plane());
        floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(floorBody);

        const addWall = (x, z, w, d, isVert) => {
            const b = new CANNON.Body({ mass: 0 });
            b.addShape(new CANNON.Box(new CANNON.Vec3(isVert ? 5 : w/2, 5, isVert ? d/2 : 5)));
            b.position.set(x + (isVert ? (x>0?4.5:-4.5) : 0), 2, z + (!isVert ? (z>0?4.5:-4.5) : 0));
            world.addBody(b);
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, 2, d), new THREE.MeshStandardMaterial({ color: 0x161920 }));
            m.position.set(x, 1, z);
            scene.add(m);
        };
        addWall(0, -18, 36, 1, false); addWall(0, 18, 36, 1, false);
        addWall(-18, 0, 1, 36, true);  addWall(18, 0, 1, 36, true);

        // --- Кубики ---
        function getDiceTex(n) {
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff'; ctx.fillRect(0,0,128,128);
            ctx.fillStyle = '#000';
            const pts = { 1:[[64,64]], 2:[[32,32],[96,96]], 3:[[32,32],[64,64],[96,96]], 4:[[32,32],[96,32],[32,96],[96,96]], 5:[[32,32],[96,32],[64,64],[32,96],[96,96]], 6:[[32,32],[96,32],[32,64],[96,64],[32,96],[96,96]] };
            pts[n].forEach(p => { ctx.beginPath(); ctx.arc(p[0], p[1], 14, 0, 7); ctx.fill(); });
            return new THREE.CanvasTexture(canvas);
        }
        const diceMats = [3,4,2,5,1,6].map(n => new THREE.MeshStandardMaterial({ map: getDiceTex(n) }));

        for (let i = 0; i < DICE_COUNT; i++) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(DICE_SIZE, DICE_SIZE, DICE_SIZE), diceMats);
            mesh.castShadow = true;
            scene.add(mesh);
            const body = new CANNON.Body({ mass: 1.5, shape: new CANNON.Box(new CANNON.Vec3(DICE_SIZE/2, DICE_SIZE/2, DICE_SIZE/2)), sleepTimeLimit: 0.1 });
            body.position.set(i*4-8, 1.1, 0);
            world.addBody(body);
            diceObjects.push({ mesh, body, isHeld: false, heldValue: 0 });
        }

        // --- Логика ---
        const rollBtn = document.getElementById('roll-btn');
        const pBar = document.getElementById('power-bar');

        const start = () => { if(!isRolling && rollsLeft > 0) { isCharging = true; charge = 0; document.getElementById('meter').style.display = 'block'; } };
        const end = () => { if(isCharging) { isCharging = false; document.getElementById('meter').style.display = 'none'; launch(); } };

        function launch() {
            isRolling = true; rollsLeft--;
            document.getElementById('rolls-count').innerText = rollsLeft;
            rollBtn.disabled = true;
            
            const power = 20 + (charge/100)*30;

            diceObjects.forEach((d, i) => {
                if (!d.isHeld) {
                    d.body.type = CANNON.Body.DYNAMIC;
                    d.body.wakeUp();
                    d.body.position.set(14, 10 + (i*3), (Math.random()-0.5)*10); 
                    d.body.velocity.set(-power - Math.random()*10, -10, (Math.random()-0.5)*20);
                    d.body.angularVelocity.set(Math.random()*30, Math.random()*30, Math.random()*30);
                }
            });
            setTimeout(wait, 1200);
        }

        function wait() {
            const timer = setInterval(() => {
                const active = diceObjects.some(d => !d.isHeld && d.body.sleepState !== CANNON.Body.SLEEPING && d.body.velocity.length() > 0.2);
                if (!active) { clearInterval(timer); isRolling = false; if(rollsLeft > 0) rollBtn.disabled = false; updateUI(); }
            }, 200);
        }

        function getVal(body) {
            const dirs = [{v:new THREE.Vector3(1,0,0),val:3},{v:new THREE.Vector3(-1,0,0),val:4},{v:new THREE.Vector3(0,1,0),val:2},{v:new THREE.Vector3(0,-1,0),val:5},{v:new THREE.Vector3(0,0,1),val:1},{v:new THREE.Vector3(0,0,-1),val:6}];
            const q = new THREE.Quaternion(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
            let max = -1, v = 1;
            dirs.forEach(d => { const worldV = d.v.clone().applyQuaternion(q); if(worldV.y > max) { max = worldV.y; v = d.val; } });
            return v;
        }

        function updateUI() {
            let total = 0;
            const tray = document.getElementById('held-tray');
            tray.innerHTML = '';
            
            diceObjects.forEach(d => {
                const currentVal = d.isHeld ? d.heldValue : getVal(d.body);
                total += currentVal;
                
                if(d.isHeld) {
                    const icon = document.createElement('div');
                    icon.className = 'die-icon';
                    icon.innerText = d.heldValue;
                    tray.appendChild(icon);
                }
            });
            document.getElementById('res-text').innerText = total;
        }

        // --- Выбор кубиков ---
        const ray = new THREE.Raycaster();
        const m = new THREE.Vector2();
        
        window.addEventListener('mousedown', (e) => {
            if(isRolling) return;
            m.x = (e.clientX / window.innerWidth) * 2 - 1; m.y = -(e.clientY / window.innerHeight) * 2 + 1;
            ray.setFromCamera(m, camera);
            const hits = ray.intersectObjects(diceObjects.map(d => d.mesh));
            
            if(hits.length > 0) {
                const d = diceObjects.find(obj => obj.mesh === hits[0].object);
                d.isHeld = !d.isHeld;
                
                if(d.isHeld) {
                    d.heldValue = getVal(d.body); // Запоминаем номинал
                    d.mesh.material.forEach(mat => { mat.emissive.setHex(0x4facfe); mat.emissiveIntensity = 0.5; });
                    d.body.type = CANNON.Body.STATIC;
                    // Располагаем в Hold зоне (сверху арены) без наложений
                    d.body.position.set(-13 + diceObjects.indexOf(d)*6.5, 1.1, -14);
                    d.body.quaternion.set(0,0,0,1);
                } else {
                    d.mesh.material.forEach(mat => mat.emissive.setHex(0));
                    d.body.type = CANNON.Body.DYNAMIC;
                    d.body.position.set((Math.random()-0.5)*10, 5, (Math.random()-0.5)*10);
                    d.body.wakeUp();
                }
                updateUI();
            }
        });

        rollBtn.addEventListener('mousedown', start);
        window.addEventListener('mouseup', end);
        document.getElementById('reset-btn').addEventListener('click', () => location.reload());

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();
            diceObjects.forEach(d => { d.mesh.position.copy(d.body.position); d.mesh.quaternion.copy(d.body.quaternion); });
            if(isCharging && charge < 100) { charge += 2.5; pBar.style.width = charge + '%'; }
            renderer.render(scene, camera);
        }
        animate();
        updateUI();
    </script>
</body>
</html>
