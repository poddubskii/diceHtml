<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Poker Dice - Bonus Columns</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
          "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
        }
      }
    </script>
    <style>
      :root {
        --p-bg: #ecffc1;
        --ai-bg: #ffffff;
        --accent: #4facfe;
        --bonus-bg: #bbbbbb;
        --border-bonus: #4facfe;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: #004d00;
        font-family: sans-serif;
        user-select: none;
        touch-action: none;
      }

      #header {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 100;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
        color: white;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      }
      .score-line {
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
        font-size: 20px;
        font-weight: 900;
      }

      #ui-layer {
        position: absolute;
        top: 80px;
        width: 100%;
        display: flex;
        justify-content: center;
        z-index: 50;
        pointer-events: none;
      }
      #game-table {
        width: 98vw;
        max-width: 480px;
        background: #add8e6;
        display: grid;
        /* 1 заголовок + 4 столбца игрока + 4 столбца ИИ = 9 колонок */
        grid-template-columns: 35px repeat(4, 1fr) repeat(4, 1fr);
        border: 1.5px solid #000;
        pointer-events: auto;
      }
      .cell {
        border: 0.5px solid rgba(0, 0, 0, 0.2);
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: bold;
        position: relative;
      }
      .row-label {
        background: #c0c0c0;
        font-size: 9px;
        justify-content: center;
        padding-left: 3px;
        color: #333;
      }

      /* Цвета столбцов */
      .p-col {
        background: var(--p-bg);
        color: var(--accent);
        cursor: pointer;
      }
      .p-bonus {
        background: var(--bonus-bg);
        border-left: 2px solid var(--border-bonus);
        border-right: 2px solid var(--border-bonus);
      } /* Выделение столбца премий */
      .a-col {
        background: var(--ai-bg);
        color: #000;
      }
      .a-bonus {
        background: var(--bonus-bg);
        border-left: 2px solid var(--border-bonus);
        border-right: 2px solid var(--border-bonus);
      }

      .hand {
        position: absolute;
        top: -22px;
        font-size: 18px;
        display: none;
      }
      .active-turn {
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
      }
      .active-turn .hand {
        display: block;
        animation: pointerAnim 0.6s infinite alternate;
      }
      @keyframes pointerAnim {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-5px);
        }
      }

      #controls {
        position: fixed;
        bottom: 15px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 100;
      }
      #roll-btn {
        width: 75px;
        height: 75px;
        border-radius: 50%;
        background: radial-gradient(circle, #ff4141, #800000);
        border: 3px solid #fff;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
      }
      #roll-btn:disabled {
        filter: grayscale(1);
        opacity: 0.5;
      }
      #hint-text {
        color: #fff;
        margin-bottom: 5px;
        font-size: 12px;
        font-weight: bold;
        text-shadow: 1px 1px 2px #000;
      }

      .filled {
        color: #fff !important;
        pointer-events: none;
      }
      .ai-filled {
        color: #0000ff !important;
      }

      /* Шапка (первая строка) */

      .row_bonus {
        border-top: 2px solid var(--border-bonus);
        border-bottom: 2px solid var(--border-bonus);
      }
      .row_bonus_head {
        border-top: 2px solid var(--border-bonus);
      }
      .col_bonus {
        border-left: 2px solid var(--border-bonus);
        border-right: 2px solid var(--border-bonus);
      }
    </style>
  </head>
  <body>
    <div id="header">
      <div class="score-line">
        <span>🪐 <span id="p-score">0</span></span>
        <span>Swan <span id="a-score">0</span></span>
      </div>
    </div>

    <div id="window-container">
      <div id="game-table">
        <div class="cell row-label"></div>
        <div
          class="cell p-col active-turn"
          style="grid-column: span 4"
          id="p-header"
        >
          <span class="hand">👆</span> PLAYER
        </div>
        <div class="cell a-col" style="grid-column: span 4" id="a-header">
          <span class="hand">👆</span> AI
        </div>
      </div>
    </div>

    <div id="controls">
      <div id="hint-text">ЖМИ ROLL (3)</div>
      <button id="roll-btn">ROLL</button>
    </div>

    <script type="module">
      import * as THREE from "three";
      import * as CANNON from "cannon-es";

      const CATEGORIES = [
        { id: "r1", n: "1" },
        { id: "r2", n: "2" },
        { id: "r3", n: "3" },
        { id: "r4", n: "4" },
        { id: "r5", n: "5" },
        { id: "r6", n: "6" },
        { id: "school-bonus", n: "" },
        { id: "pair", n: "Para" },
        { id: "two", n: "2+2" },
        { id: "set", n: "▲" },
        { id: "sq", n: "■" },
        { id: "full", n: "Full" },
        { id: "lstr", n: "LStr" },
        { id: "bstr", n: "BStr" },
        { id: "pok", n: "Poker" },
        { id: "ch", n: "💲" },
        { id: "game-bonus", n: "" },
      ];

      // Добавили 4-й объект в массивы p и a для премий
      let game = {
        p: [{}, {}, {}, {}],
        a: [{}, {}, {}, {}],
        rolls: 3,
        turn: "p",
        locked: false,
      };

      // --- ГЕНЕРАЦИЯ ТАБЛИЦЫ ---
      const table = document.getElementById("game-table");
      let rowIndex = 0; // Инициализируем счетчик строк перед циклом
      CATEGORIES.forEach((cat) => {
        // 1. Создаем заголовок строки (№)
        const lbl = document.createElement("div");
        lbl.className = "cell row-label";
        lbl.innerText = cat.n;
        table.appendChild(lbl);

        // 2. Вспомогательная функция для стилей
        const applyStyles = (cell, colIndex) => {
          if (rowIndex === 0) cell.classList.add("row_bonus_head");
          if (rowIndex === 6 || rowIndex === 16)
            cell.classList.add("row_bonus");
          if (colIndex === 3) cell.classList.add("col_bonus");
        };

        // 3. Создаем столбцы Игрока (0, 1, 2, 3-премия)
        for (let i = 0; i < 4; i++) {
          const c = document.createElement("div");
          c.className = "cell p-col";
          c.id = `p_${i}_${cat.id}`;
          c.onclick = () => onCellClick(i, cat.id);

          applyStyles(c, i); // Применяем выделение
          table.appendChild(c);
        }

        // 4. Создаем столбцы ИИ (0, 1, 2, 3-премия)
        for (let i = 0; i < 4; i++) {
          const c = document.createElement("div");
          c.className = "cell a-col";
          c.id = `a_${i}_${cat.id}`;

          applyStyles(c, i); // Применяем выделение
          table.appendChild(c);
        }

        rowIndex++; // Переходим к следующей строке ПОСЛЕ отрисовки всех колонок
      });
      // --- ФИЗИКА И 3D (кратко для стабильности) ---
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        1,
        1000
      );
      camera.position.set(0, 45, 20);
      camera.lookAt(0, -5, 0);
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const world = new CANNON.World();
      world.gravity.set(0, -50, 0);
      const floorBody = new CANNON.Body({ mass: 0 });
      floorBody.addShape(new CANNON.Box(new CANNON.Vec3(50, 5, 50)));
      floorBody.position.set(0, -5, 0);
      world.addBody(floorBody);

      const dice = [];
      const createDiceMats = () =>
        [1, 2, 3, 4, 5, 6].map((n) => {
          const c = document.createElement("canvas");
          c.width = 64;
          c.height = 64;
          const ctx = c.getContext("2d");
          ctx.fillStyle = "white";
          ctx.fillRect(0, 0, 64, 64);
          ctx.fillStyle = "red";
          const pts = {
            1: [[32, 32]],
            2: [
              [16, 16],
              [48, 48],
            ],
            3: [
              [16, 16],
              [32, 32],
              [48, 48],
            ],
            4: [
              [16, 16],
              [48, 16],
              [16, 48],
              [48, 48],
            ],
            5: [
              [16, 16],
              [48, 16],
              [32, 32],
              [16, 48],
              [48, 48],
            ],
            6: [
              [16, 16],
              [48, 16],
              [16, 32],
              [48, 32],
              [16, 48],
              [48, 48],
            ],
          };
          pts[n].forEach((p) => {
            ctx.beginPath();
            ctx.arc(p[0], p[1], 7, 0, 7);
            ctx.fill();
          });
          return new THREE.MeshStandardMaterial({
            map: new THREE.CanvasTexture(c),
          });
        });

      for (let i = 0; i < 5; i++) {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(2.4, 2.4, 2.4),
          createDiceMats()
        );
        scene.add(mesh);
        const body = new CANNON.Body({
          mass: 2,
          shape: new CANNON.Box(new CANNON.Vec3(1.2, 1.2, 1.2)),
        });
        body.position.set(i * 3 - 6, 1.2, 10);
        world.addBody(body);
        dice.push({ mesh, body, held: false });
      }
      scene.add(new THREE.AmbientLight(0xffffff, 1.5));

      // --- УПРАВЛЕНИЕ ---
      window.addEventListener("pointerdown", (e) => {
        if (game.rolls === 3 || game.turn !== "p" || game.locked) return;
        const ray = new THREE.Raycaster();
        const mouse = new THREE.Vector2(
          (e.clientX / window.innerWidth) * 2 - 1,
          -(e.clientY / window.innerHeight) * 2 + 1
        );
        ray.setFromCamera(mouse, camera);
        const hits = ray.intersectObjects(dice.map((d) => d.mesh));
        if (hits.length > 0) {
          const d = dice.find((die) => die.mesh === hits[0].object);
          d.held = !d.held;
          d.body.type = d.held ? CANNON.Body.STATIC : CANNON.Body.DYNAMIC;
          d.body.position.y = d.held ? 5 : 1.2;
          d.mesh.material.forEach((m) =>
            m.emissive?.setHex(d.held ? 0x00aaff : 0)
          );
        }
      });

      function roll() {
        if (game.rolls <= 0 || game.locked) return;
        game.locked = true;
        game.rolls--;
        document.getElementById(
          "hint-text"
        ).innerText = `БРОСОК... (${game.rolls})`;
        document.getElementById("roll-btn").disabled = true;
        dice.forEach((d) => {
          if (!d.held) {
            d.body.type = CANNON.Body.DYNAMIC;
            d.body.position.set(
              (Math.random() - 0.5) * 4,
              10,
              (Math.random() - 0.5) * 4
            );
            d.body.velocity.set(
              (Math.random() - 0.5) * 20,
              -10,
              (Math.random() - 0.5) * 20
            );
            d.body.angularVelocity.set(
              Math.random() * 15,
              Math.random() * 15,
              Math.random() * 15
            );
            d.body.wakeUp();
          }
        });
        setTimeout(() => {
          const timer = setInterval(() => {
            if (!dice.some((d) => d.body.velocity.length() > 0.1)) {
              clearInterval(timer);
              game.locked = false;
              if (game.rolls > 0)
                document.getElementById("roll-btn").disabled = false;
              document.getElementById("hint-text").innerText =
                game.rolls > 0 ? "ВЫБЕРИ ИЛИ ЗАПИШИ" : "ЗАПИСЫВАЙ!";
            }
          }, 300);
        }, 1000);
      }

      function onCellClick(col, catId) {
        if (
          game.turn !== "p" ||
          game.rolls === 3 ||
          game.p[col][catId] !== undefined ||
          game.locked
        )
          return;

        const vals = dice.map((d) => {
          const q = d.body.quaternion;
          const v = new THREE.Quaternion(q.x, q.y, q.z, q.w);
          const dirs = [
            { v: new THREE.Vector3(1, 0, 0), n: 3 },
            { v: new THREE.Vector3(-1, 0, 0), n: 4 },
            { v: new THREE.Vector3(0, 1, 0), n: 2 },
            { v: new THREE.Vector3(0, -1, 0), n: 5 },
            { v: new THREE.Vector3(0, 0, 1), n: 1 },
            { v: new THREE.Vector3(0, 0, -1), n: 6 },
          ];
          let max = -1,
            res = 1;
          dirs.forEach((dr) => {
            const up = dr.v.clone().applyQuaternion(v).y;
            if (up > max) {
              max = up;
              res = dr.n;
            }
          });
          return res;
        });

        // Простой расчет очков (сумма для примера)
        const counts = {};
        vals.forEach((x) => (counts[x] = (counts[x] || 0) + 1));
        const sum = vals.reduce((a, b) => a + b, 0);
        let score = 0;
        if (catId.startsWith("r"))
          score = (counts[catId.slice(1)] || 0) * parseInt(catId.slice(1));
        else score = sum; // Упрощенно для других категорий

        game.p[col][catId] = score;
        const el = document.getElementById(`p_${col}_${catId}`);
        el.innerText = score === 0 ? "X" : score;
        el.classList.add("filled");
        nextTurn();
      }

      function nextTurn() {
        updateTotals();
        dice.forEach((d, i) => {
          d.held = false;
          d.body.type = CANNON.Body.STATIC;
          d.body.position.set(i * 3 - 6, 1.2, 10);
          d.body.quaternion.set(0, 0, 0, 1);
          d.mesh.material.forEach((m) => m.emissive?.setHex(0));
        });

        if (game.turn === "p") {
          game.turn = "a";
          toggleHand();
          document.getElementById("roll-btn").disabled = true;
          setTimeout(() => {
            let col = Math.floor(Math.random() * 4),
              cat =
                CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)].id;
            while (game.a[col][cat] !== undefined) {
              col = Math.floor(Math.random() * 4);
              cat =
                CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)].id;
            }
            game.a[col][cat] = Math.floor(Math.random() * 20);
            document.getElementById(`a_${col}_${cat}`).innerText =
              game.a[col][cat] || "X";
            document
              .getElementById(`a_${col}_${cat}`)
              .classList.add("ai-filled");
            nextTurn();
          }, 1000);
        } else {
          game.turn = "p";
          game.rolls = 3;
          toggleHand();
          document.getElementById("roll-btn").disabled = false;
        }
      }

      function toggleHand() {
        document
          .getElementById("p-header")
          .classList.toggle("active-turn", game.turn === "p");
        document
          .getElementById("a-header")
          .classList.toggle("active-turn", game.turn === "a");
      }

      function updateTotals() {
        const s = (side) =>
          game[side].reduce(
            (acc, col) => acc + Object.values(col).reduce((v, b) => v + b, 0),
            0
          );
        document.getElementById("p-score").innerText = s("p");
        document.getElementById("a-score").innerText = s("a");
      }

      const win = document.getElementById("window-container");
      const handles = document.querySelectorAll(".drag-handle");
      let isDragging = false,
        offset = { x: 0, y: 0 };

      const startDrag = (e) => {
        isDragging = true;
        const clientX = e.type.includes("touch")
          ? e.touches[0].clientX
          : e.clientX;
        const clientY = e.type.includes("touch")
          ? e.touches[0].clientY
          : e.clientY;
        offset.x = clientX - win.offsetLeft;
        offset.y = clientY - win.offsetTop;
      };

      const doDrag = (e) => {
        if (!isDragging) return;
        const clientX = e.type.includes("touch")
          ? e.touches[0].clientX
          : e.clientX;
        const clientY = e.type.includes("touch")
          ? e.touches[0].clientY
          : e.clientY;
        win.style.left = clientX - offset.x + "px";
        win.style.top = clientY - offset.y + "px";
      };

      handles.forEach((h) => {
        h.addEventListener("mousedown", startDrag);
        h.addEventListener("touchstart", startDrag);
      });
      window.addEventListener("mousemove", doDrag);
      window.addEventListener("touchmove", doDrag, { passive: false });
      window.addEventListener("mouseup", () => (isDragging = false));
      window.addEventListener("touchend", () => (isDragging = false));

      document.getElementById("roll-btn").onclick = roll;
      function animate() {
        requestAnimationFrame(animate);
        world.step(1 / 60);
        dice.forEach((d) => {
          d.mesh.position.copy(d.body.position);
          d.mesh.quaternion.copy(d.body.quaternion);
        });
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
